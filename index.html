<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的网站</title>
</head>
<body>
    <h1>网站运行成功！</h1>
    <p>后端状态：<span id="status">加载中...</span></p>

    <script>
        // 这里连接你的后端
        fetch("/api/hello")
        .then(res => res.json())
        .then(data => {
            document.getElementById("status").innerText = "✅ 正常运行";
        })
        .catch(() => {
            document.getElementById("status").innerText = "❌ 连接失败";
        });
    </script>
</body>
</html>
