<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>港澳订单识别系统</title>
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="navbar-title">港澳订单识别系统</div>
  <div class="navbar-actions">
    <button class="btn btn-primary" onclick="showDatabase()">数据库</button>
    <button class="btn btn-primary" onclick="exportData()">导出备份</button>
    <button class="btn btn-primary" onclick="importData()">导入恢复</button>
    <button class="btn btn-reset" onclick="resetTable()">清空所有记录</button>
    <button class="btn btn-clear" onclick="clearAllInput()">清空输入框</button>
  </div>
</div>

<div class="container">
  <div class="card recognize-wrap">
    <div class="order-input-container">
      <div class="input-column">
        <div class="box-label">原始订单粘贴</div>
        <textarea class="source-order-input" placeholder="粘贴原始订单"></textarea>
      </div>
      <div class="result-column">
        <div class="box-label">识别结果</div>
        <textarea id="orderResult" class="result-content" readonly></textarea>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="convertOrderText()">开始识别</button>
      <button class="btn btn-paste" onclick="pasteOrder()">粘贴剪贴板</button>
      <button class="btn btn-save-order" onclick="saveOrder()">保存订单</button>
      <button class="btn btn-report" onclick="saveReportOrder()">上报订单</button>
    </div>

    <div class="summary-row">
      <div class="summary-item">
        <label>日期：</label>
        <input type="date" id="orderDate">
      </div>
      <div class="summary-item">
        <label>用户：</label>
        <select id="orderUserSelect"></select>
      </div>
      <div class="summary-item" id="orderTotalAmountBox">
        总金额：<span id="orderTotalAmount">0</span>
      </div>
    </div>

    <div class="freq-container">
      <div class="card freq-card">
        <div class="freq-title">号码投注统计</div>
        <table class="freq-table">
          <thead><tr><th>号码</th><th>金额</th></tr></thead>
          <tbody id="numberFreqTable"></tbody>
        </table>
      </div>
      <div class="card freq-card">
        <div class="freq-title">生肖投注统计</div>
        <table class="freq-table">
          <thead><tr><th>生肖</th><th>金额</th></tr></thead>
          <tbody id="zodiacFreqTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card risk-report-area">
    <div class="card-title">
      <div class="title-left">
        风险报表 & 上报查询
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-item">
        <label>日期：</label>
        <input type="date" id="filterDate" onchange="generateRiskTable()">
      </div>
      <div class="summary-item">
        <label>用户：</label>
        <select id="viewUserSelect" onchange="generateRiskTable()"></select>
      </div>
      <div class="summary-item">
        <label>倍数：</label>
        <input type="number" class="small-input" id="multipleVal" value="47" onchange="generateRiskTable()">
      </div>
      <div class="summary-item">
        <label>返点 %：</label>
        <input type="number" class="small-input" id="rebateRate" value="4" onchange="generateRiskTable()">
      </div>
      <button class="btn btn-copy" onclick="copyTable()">复制表格</button>
      <button class="btn btn-screenshot" onclick="screenshotTable('riskTable')">截图表格</button>
    </div>

    <div class="table-container">
      <table id="riskTable">
        <thead>
          <tr>
            <th>号码</th>
            <th>投注</th>
            <th>风险</th>
            <th>用户</th>
            <th>排名</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="summary-row" style="margin-top:10px">
      <div class="summary-item">总投注：<span id="totalBet">0</span></div>
      <div class="summary-item">总返点：<span id="totalRebate">0</span></div>
    </div>
  </div>

  <div class="storage-info">
    已用空间：<span id="usedSpace">0</span> | 总记录数：<span id="orderCount">0</span>
  </div>
</div>

<div id="databaseModal" class="database-modal" style="display:none">
  <div class="database-modal-box">
    <div class="database-modal-header">
      <h3>数据库配置</h3>
      <button class="close-database-btn" onclick="hideDatabase()">×</button>
    </div>
    <div class="data-config-actions">
      <button class="btn btn-primary" onclick="hideDatabase()">关闭</button>
    </div>
  </div>
</div>

<script src="/public/js/config.js"></script>
<script src="/public/js/script.js"></script>
</body>
</html>
