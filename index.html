<!DOCTYPE html>
<script>
const allowHost = "glx1105.github.io";
if (location.host !== allowHost) {
  document.documentElement.innerHTML = "<h1>未授权站点</h1>";
  throw new Error("Unauthorized");
}
let devtools = { open: false };
setInterval(() => {
  const before = new Date().getTime();
  debugger;
  const after = new Date().getTime();
  if (after - before > 100) { devtools.open = true; }
}, 100);
setInterval(() => {
  if (devtools.open) {
    document.body.innerHTML = "<h1>检测到非法调试</h1>";
    throw new Error("DevTools detected");
  }
}, 500);
document.addEventListener("contextmenu", e => {
  const activeElement = document.activeElement;
  const isInputElement = activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA');
  if (isInputElement) { return; }
  e.preventDefault();
});
document.addEventListener("keydown", e => {
  if (e.key === "F12" || (e.ctrlKey && e.key === "u") || (e.ctrlKey && e.shiftKey && e.key === "i")) {
    e.preventDefault();
  }
});
</script>

function applyFilters() { if (daysFilterActive && daysForwardValue !== null) updateDaysRangeInfo(); updateHistoryUserFilter(); updateStorageIndicator(); refreshRightSidePanels(); updateHistoryDisplay(); if (document.getElementById('paymentDialog').classList.contains('active')) refreshTable2UserData(); }
function refreshRightSidePanels() { updateUserCardsDisplay(); updateSummaryDisplay(); updateMyAccountCards(); }
function getFilteredRecords() { const dateFilterValue = document.getElementById('dateFilter').value; const categoryFilterValue = document.getElementById('categoryFilter').value; const userFilterValue = document.getElementById('userFilter').value; let records = [...historyRecords]; if (daysFilterActive && daysForwardValue !== null) { const baseDate = dateFilterValue || getChinaToday(); records = records.filter(r => isDateInRange(r.timestamp, baseDate, daysForwardValue)); } else if (dateFilterValue) { records = records.filter(r => r.timestamp === dateFilterValue); } if (categoryFilterValue) { records = records.filter(r => r.category === categoryFilterValue); } if (userFilterValue) { records = records.filter(r => r.applicant === userFilterValue); } return records; }

/* ========== 收付弹窗核心逻辑 ========== */
// 表格2的行数据存储
let paymentTable2Rows = JSON.parse(localStorage.getItem('paymentTable2Data') || '[]'); // [{index:0, no:'', nick:'', remark:'', locked:false}, ...]

function saveTable2RowsData() {
    const rows = document.querySelectorAll('#paymentTable2 tbody tr');
    const data = Array.from(rows).map((row, i) => {
        const no = row.querySelector('.col-no')?.value || '';
        const nick = row.querySelector('.col-nick')?.value || '';
        const remark = row.querySelector('.col-remark')?.value || '';
        const locked = row.querySelector('.col-no')?.hasAttribute('readonly') || false;
        return { index: i, no, nick, remark, locked };
    });
    localStorage.setItem('paymentTable2Data', JSON.stringify(data));
    paymentTable2Rows = data;
}

function loadTable2RowsData() {
    paymentTable2Rows = JSON.parse(localStorage.getItem('paymentTable2Data') || '[]');
}

function initPaymentTables() {
    loadTable2RowsData();
    const table1Body = document.getElementById('paymentTable1Body');
    let html1 = '';
    for (let i = 0; i < 118; i++) {
        html1 += `<tr>
            <td><input type="text" class="col-index" oninput="handleTable1IndexChange(this)"></td>
            <td><input type="text" class="col-nick"></td>
            <td><input type="text" class="col-profit" oninput="updateProfitColor(this); updateRowCalculations(this.closest('tr'))"></td>
            <td><input type="text" class="col-accumulate"></td>
            <td><input type="text" class="col-receive-pay" oninput="updateRowCalculations(this.closest('tr'))"></td>
            <td><input type="text" class="col-total" readonly></td>
            <td><input type="text" class="col-balance" readonly></td>
        </tr>`;
    }
    table1Body.innerHTML = html1;

    const table2Body = document.getElementById('paymentTable2Body');
    const records = getFilteredRecords(); // 当前筛选用户数据
    let html2 = '';
    for (let i = 0; i < 118; i++) {
        const saved = paymentTable2Rows.find(r => r.index === i) || {};
        const noVal = saved.no || '';
        const nickVal = saved.nick || '';
        const remarkVal = saved.remark || '';
        const locked = saved.locked || false;
        // 确定用户和盈亏：如果备注有内容，精确匹配；否则按顺序取记录
        let user = '', profit = '';
        if (remarkVal.trim() !== '') {
            const matched = records.find(r => r.applicant === remarkVal.trim());
            if (matched) {
                user = matched.applicant;
                profit = Math.trunc(parseFloat(matched.extractedData.profitLoss || 0));
            }
        } else {
            if (i < records.length) {
                user = records[i].applicant;
                profit = Math.trunc(parseFloat(records[i].extractedData.profitLoss || 0));
            }
        }
        html2 += `<tr>
            <td><input type="text" class="col-no" value="${escapeHtml(noVal)}" oninput="onTable2InputChange(this)" ${locked ? 'readonly' : ''}></td>
            <td><input type="text" class="col-nick" value="${escapeHtml(nickVal)}" oninput="onTable2InputChange(this)" ${locked ? 'readonly' : ''}></td>
            <td><input type="text" class="col-remark" value="${escapeHtml(remarkVal)}" oninput="onTable2RemarkChange(this)" ${locked ? 'readonly' : ''}></td>
            <td class="col-user">${escapeHtml(user)}</td>
            <td class="col-profit-auto">${profit !== '' ? '<span class="' + (profit >= 0 ? 'profit-color-positive' : 'profit-color-negative') + '">' + profit + '</span>' : ''}</td>
        </tr>`;
    }
    table2Body.innerHTML = html2;
    updateTable2EditButtons();
}

function refreshTable2UserData() {
    // 仅更新用户和盈亏列，保留输入框内容
    const rows = document.querySelectorAll('#paymentTable2 tbody tr');
    const records = getFilteredRecords();
    rows.forEach((row, i) => {
        const remarkInput = row.querySelector('.col-remark');
        const remark = remarkInput ? remarkInput.value.trim() : '';
        let user = '', profit = '';
        if (remark !== '') {
            const matched = records.find(r => r.applicant === remark);
            if (matched) {
                user = matched.applicant;
                profit = Math.trunc(parseFloat(matched.extractedData.profitLoss || 0));
            }
        } else {
            if (i < records.length) {
                user = records[i].applicant;
                profit = Math.trunc(parseFloat(records[i].extractedData.profitLoss || 0));
            }
        }
        const userCell = row.querySelector('.col-user');
        const profitCell = row.querySelector('.col-profit-auto');
        if (userCell) userCell.textContent = user;
        if (profitCell) {
            profitCell.innerHTML = profit !== '' ? `<span class="${profit >= 0 ? 'profit-color-positive' : 'profit-color-negative'}">${profit}</span>` : '';
        }
    });
}

function onTable2InputChange(input) {
    // 标记该行修改，保存按钮会处理
}

function onTable2RemarkChange(input) {
    const row = input.closest('tr');
    const remark = input.value.trim();
    const records = getFilteredRecords();
    if (remark !== '') {
        const matched = records.find(r => r.applicant === remark);
        if (matched) {
            row.querySelector('.col-user').textContent = matched.applicant;
            const profit = Math.trunc(parseFloat(matched.extractedData.profitLoss || 0));
            row.querySelector('.col-profit-auto').innerHTML = `<span class="${profit >= 0 ? 'profit-color-positive' : 'profit-color-negative'}">${profit}</span>`;
        } else {
            row.querySelector('.col-user').textContent = '';
            row.querySelector('.col-profit-auto').innerHTML = '';
        }
    } else {
        // 备注清空，恢复默认按顺序填充
        const rows = document.querySelectorAll('#paymentTable2 tbody tr');
        const idx = Array.from(rows).indexOf(row);
        const records = getFilteredRecords();
        if (idx < records.length) {
            row.querySelector('.col-user').textContent = records[idx].applicant;
            const profit = Math.trunc(parseFloat(records[idx].extractedData.profitLoss || 0));
            row.querySelector('.col-profit-auto').innerHTML = `<span class="${profit >= 0 ? 'profit-color-positive' : 'profit-color-negative'}">${profit}</span>`;
        } else {
            row.querySelector('.col-user').textContent = '';
            row.querySelector('.col-profit-auto').innerHTML = '';
        }
    }
}

function saveTable2Data() {
    const rows = document.querySelectorAll('#paymentTable2 tbody tr');
    let anyFilled = false;
    rows.forEach((row, i) => {
        const no = row.querySelector('.col-no').value.trim();
        const nick = row.querySelector('.col-nick').value.trim();
        const remark = row.querySelector('.col-remark').value.trim();
        if (no || nick || remark) {
            anyFilled = true;
            row.querySelector('.col-no').setAttribute('readonly', 'readonly');
            row.querySelector('.col-nick').setAttribute('readonly', 'readonly');
            row.querySelector('.col-remark').setAttribute('readonly', 'readonly');
        }
    });
    saveTable2RowsData();
    updateTable2EditButtons();
    if (!anyFilled) showToast('没有需要保存的行', 'warning');
    else showToast('已保存并锁定有内容的行', 'success');
}

function setTable2Editable(editable) {
    const rows = document.querySelectorAll('#paymentTable2 tbody tr');
    rows.forEach(row => {
        if (editable) {
            row.querySelector('.col-no').removeAttribute('readonly');
            row.querySelector('.col-nick').removeAttribute('readonly');
            row.querySelector('.col-remark').removeAttribute('readonly');
        }
    });
    // 保存状态（所有行解锁）
    paymentTable2Rows = [];
    saveTable2RowsData();
    updateTable2EditButtons();
}

function updateTable2EditButtons() {
    const btnEdit = document.getElementById('btnEditTable2');
    const btnSave = document.getElementById('btnSaveTable2');
    const anyLocked = document.querySelector('#paymentTable2 tbody input[readonly]') !== null;
    btnEdit.style.display = anyLocked ? 'inline-block' : 'none';
    btnSave.style.display = 'inline-block';
}

// 表格1计算函数
function updateRowCalculations(row) {
    const receivePayInput = row.querySelector('.col-receive-pay');
    const totalInput = row.querySelector('.col-total');
    const profitInput = row.querySelector('.col-profit');
    const balanceInput = row.querySelector('.col-balance');
    let sum = 0;
    if (receivePayInput) {
        const text = receivePayInput.value;
        const matches = text.match(/-?\d+/g);
        if (matches) sum = matches.reduce((acc, val) => acc + parseInt(val, 10), 0);
    }
    if (totalInput) totalInput.value = sum;
    if (balanceInput && profitInput && totalInput) {
        const profitVal = parseFloat(profitInput.value) || 0;
        const totalVal = parseFloat(totalInput.value) || 0;
        const balance = profitVal - totalVal;
        balanceInput.value = balance;
        balanceInput.classList.remove('profit-color-positive', 'profit-color-negative');
        if (balance > 0) balanceInput.classList.add('profit-color-positive');
        else if (balance < 0) balanceInput.classList.add('profit-color-negative');
    }
}

function handleTable1IndexChange(input) {
    const val = input.value.trim();
    const row = input.closest('tr');
    const nickInput = row.querySelector('.col-nick');
    const profitInput = row.querySelector('.col-profit');
    nickInput.value = '';
    profitInput.value = '';
    profitInput.classList.remove('profit-color-positive', 'profit-color-negative');
    if (!val) return;
    const table2 = document.getElementById('paymentTable2');
    const rows2 = table2.querySelectorAll('tbody tr');
    for (const r2 of rows2) {
        const noInput = r2.querySelector('.col-no');
        if (noInput && noInput.value.trim() === val) {
            const nick2 = r2.querySelector('.col-nick');
            if (nick2) nickInput.value = nick2.value;
            const profitCell = r2.querySelector('.col-profit-auto');
            if (profitCell) {
                const span = profitCell.querySelector('span');
                if (span) {
                    profitInput.value = span.textContent.trim();
                    updateProfitColor(profitInput);
                }
            }
            break;
        }
    }
    updateRowCalculations(row);
}
function updateProfitColor(input) {
    const val = input.value.trim();
    input.classList.remove('profit-color-positive', 'profit-color-negative');
    if (val === '' || isNaN(val)) return;
    const num = parseFloat(val);
    if (num > 0) input.classList.add('profit-color-positive');
    else if (num < 0) input.classList.add('profit-color-negative');
}
function escapeHtml(text) { const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'}; return String(text).replace(/[&<>"']/g, m => map[m]); }

// 导出导入覆盖
function getPaymentData() {
    const table1Rows = document.querySelectorAll('#paymentTable1 tbody tr');
    const table1Data = Array.from(table1Rows).map(row => ({
        index: row.querySelector('.col-index')?.value || '',
        nick: row.querySelector('.col-nick')?.value || '',
        profit: row.querySelector('.col-profit')?.value || '',
        accumulate: row.querySelector('.col-accumulate')?.value || '',
        receivePay: row.querySelector('.col-receive-pay')?.value || '',
        total: row.querySelector('.col-total')?.value || '',
        balance: row.querySelector('.col-balance')?.value || ''
    }));
    return { table1: table1Data, table2: paymentTable2Rows };
}
function applyPaymentData(data) {
    if (!data) return;
    if (data.table1) {
        const rows = document.querySelectorAll('#paymentTable1 tbody tr');
        data.table1.forEach((d, i) => {
            if (rows[i]) {
                rows[i].querySelector('.col-index').value = d.index;
                rows[i].querySelector('.col-nick').value = d.nick;
                rows[i].querySelector('.col-profit').value = d.profit;
                rows[i].querySelector('.col-accumulate').value = d.accumulate;
                rows[i].querySelector('.col-receive-pay').value = d.receivePay;
                rows[i].querySelector('.col-total').value = d.total;
                rows[i].querySelector('.col-balance').value = d.balance;
                updateProfitColor(rows[i].querySelector('.col-profit'));
                updateProfitColor(rows[i].querySelector('.col-balance'));
            }
        });
    }
    if (data.table2) {
        localStorage.setItem('paymentTable2Data', JSON.stringify(data.table2));
        paymentTable2Rows = data.table2;
        // 重新渲染表格2以应用锁定状态
        initPaymentTables();
    }
}
const originalExportAllData = exportAllData;
exportAllData = async function() {
    if (historyRecords.length === 0 && paymentTable2Rows.length === 0) { showToast('没有数据可导出！', 'error'); return; }
    const paymentData = getPaymentData();
    const exportObj = { historyRecords, paymentData };
    const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `订单报表系统_所有数据_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 0);
    showToast('所有数据（含收付管理）导出成功！', 'success');
};
async function importAllDataFromJSON(data) {
    try {
        if (data.historyRecords) {
            let cnt = 0;
            for (const item of data.historyRecords) {
                if (item.originalData && item.timestamp && item.applicant && item.category) {
                    const newRec = { id: Date.now() + Math.random(), ...item, createdAt: new Date().toISOString() };
                    const validation = DataValidator.validateRecord(newRec);
                    if (!validation.valid) continue;
                    historyRecords.unshift(newRec);
                    try { await saveToDatabase(STORE_NAME, newRec); } catch(e) {}
                    cnt++;
                }
            }
            updateHistoryDisplay(); updateUserCardsDisplay(); updateSummaryDisplay(); updateMyAccountCards();
            updateRecycleBadge(); populateFilterOptions(); updateStorageIndicator();
            showToast(`成功导入 ${cnt} 条历史记录！`, 'success');
        }
        if (data.paymentData) {
            applyPaymentData(data.paymentData);
            showToast('收付数据已恢复', 'success');
        }
    } catch(e) { showToast(`导入失败: ${e.message}`, 'error'); }
}
function importAllData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try { const data = JSON.parse(ev.target.result); await importAllDataFromJSON(data); }
            catch(e) { showToast(`导入失败: ${e.message}`, 'error'); }
        };
        reader.readAsText(file);
    };
    input.click();
}
