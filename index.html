<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>港澳订单管理系统</title>
  <style>
    /* 全局样式 */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; background:#f0f2f5; min-height:100vh; }
    .toast-message { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 24px; border-radius:6px; z-index:10000; opacity:0; transition:opacity 0.3s; }
    .toast-message.show { opacity:1; }

    /* 自定义对话框 */
    .custom-dialog-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:9000; display:flex; align-items:center; justify-content:center; }
    .custom-dialog-box { background:#fff; border-radius:8px; padding:20px; min-width:300px; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
    .custom-dialog-title { font-size:18px; font-weight:bold; margin-bottom:12px; }
    .custom-dialog-message { margin-bottom:16px; color:#333; }
    .custom-dialog-input { width:100%; padding:6px 10px; border:1px solid #ddd; border-radius:4px; margin-bottom:12px; }
    .custom-dialog-buttons { display:flex; gap:8px; justify-content:flex-end; }
    .custom-dialog-btn { padding:6px 18px; border:none; border-radius:4px; cursor:pointer; }
    .custom-dialog-btn.confirm { background:#007bff; color:#fff; }
    .custom-dialog-btn.cancel { background:#6c757d; color:#fff; }

    /* 登录遮罩 */
    #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; z-index:8000; display:flex; align-items:center; justify-content:center; }
    .login-box { background:#fff; padding:30px; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,0.1); width:360px; }
    .login-box h2 { margin-bottom:20px; text-align:center; }
    .login-box input[type="text"], .login-box input[type="password"] { width:100%; padding:10px; margin-bottom:12px; border:1px solid #ddd; border-radius:4px; }
    .login-box .btn { width:100%; padding:10px; border:none; border-radius:4px; color:#fff; background:#007bff; cursor:pointer; font-size:16px; }
    .login-box .btn.secondary { background:#6c757d; }
    .login-box .error-text { color:#e74c3c; font-size:13px; margin-bottom:8px; }
    .login-box .links { margin-top:12px; text-align:center; font-size:13px; }
    .login-box .links a { color:#007bff; cursor:pointer; text-decoration:none; }
    .login-box .remember-row { display:flex; align-items:center; gap:6px; margin-bottom:12px; font-size:13px; }
    .admin-area { margin-top:12px; }

    /* 主内容 */
    #mainContent { display:none; padding:10px; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .card { background:#fff; border-radius:8px; padding:16px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .card-title { font-weight:bold; margin-bottom:8px; }

    /* 识别相关 */
    .order-input-container { display:flex; gap:10px; height:240px; }
    .input-column, .result-column { flex:1; display:flex; flex-direction:column; }
    .box-label { font-size:13px; color:#666; margin-bottom:4px; }
    .source-order-input, .result-content { flex:1; border:1px solid #ddd; border-radius:4px; padding:8px; resize:none; font-family:monospace; }
    .btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-size:13px; margin:2px; }
    .btn-primary { background:#007bff; color:#fff; }
    .btn-danger { background:#e74c3c; color:#fff; }
    .btn-secondary { background:#6c757d; color:#fff; }
    .btn-success { background:#28a745; color:#fff; }
    .btn-warning { background:#f39c12; color:#fff; }
    .category-btn { background:#e9ecef; border:1px solid #ccc; padding:4px 8px; margin:2px; border-radius:3px; cursor:pointer; font-size:12px; }
    .category-btn.active { background:#007bff; color:#fff; }

    /* 表格 */
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { border:1px solid #eee; padding:4px 6px; text-align:center; }
    .red-text { color:#e74c3c; }
    .blue-text { color:#3498db; }
    .green-text { color:#27ae60; }
    .black-text { color:#000; }
    .highlight-number { background:yellow; padding:0 2px; border-radius:2px; }

    /* 浮动窗口 */
    .floating-window { position:fixed; background:#fff; border:1px solid #ccc; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.2); resize:both; overflow:auto; display:flex; flex-direction:column; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:#f8f9fa; border-bottom:1px solid #ddd; cursor:move; }
    .window-controls button { background:none; border:none; cursor:pointer; font-size:16px; padding:0 4px; }
    .modal-body { padding:12px; flex:1; overflow:auto; }
    .modal-footer { padding:8px 12px; border-top:1px solid #ddd; display:flex; justify-content:flex-end; }

    /* 存储信息 */
    #storageInfo { position:fixed; bottom:0; left:0; width:100%; background:#f8f9fa; border-top:1px solid #ddd; padding:4px 12px; font-size:12px; display:flex; gap:20px; }
  </style>
</head>
<body>

<!-- 登录遮罩 -->
<div id="loginOverlay" style="display:none;">
  <div class="login-box">
    <div id="loginFormView">
      <h2>港澳订单系统</h2>
      <input type="text" id="loginUsername" placeholder="用户名">
      <input type="password" id="loginPassword" placeholder="密码">
      <div class="remember-row"><input type="checkbox" id="rememberPwd"><label>记住密码</label></div>
      <div class="error-text" id="loginError"></div>
      <button class="btn" id="loginBtn">登 录</button>
      <div class="links">
        <a id="showRegisterLink">注册新账号</a> | <a id="showAdminLoginLink">管理员登录</a>
      </div>
      <div id="adminLoginArea" style="display:none; margin-top:8px;">
        <input type="password" id="adminPassword" placeholder="管理员密码">
        <button class="btn btn-warning" id="adminLoginConfirmBtn">管理员进入</button>
      </div>
    </div>

    <div id="registerFormView" style="display:none;">
      <h2>注册新账号</h2>
      <input type="text" id="regUsername" placeholder="用户名">
      <input type="password" id="regPassword" placeholder="密码">
      <div class="error-text" id="registerError"></div>
      <button class="btn" id="registerBtn">注 册</button>
      <div class="links"><a id="backToLoginFromReg">返回登录</a></div>
    </div>

    <div id="activateFormView" style="display:none;">

      <input type="text" id="actUsername" placeholder="用户名" readonly>
      <input type="text" id="actCode" placeholder="激活码">
      <div class="error-text" id="activateError"></div>
      <button class="btn" id="activateBtn">激 活</button>
      <div class="links"><a id="backToLoginFromAct">返回登录</a></div>
    </div>
  </div>
</div>

<!-- 主内容区（登录后显示） -->
<div id="mainContent" style="display:none;">
  <div class="header">
    <h2>港澳订单管理系统</h2>
    <div>
      <span id="currentUserDisplay"></span>
      <button class="btn btn-secondary" onclick="showRecognizeModal()">订单输入</button>
      <button class="btn btn-secondary" onclick="showOrderRecord('all')">下单记录</button>
      <button class="btn btn-secondary" onclick="showReportOrderRecord('all')">上报记录</button>

      <button class="btn btn-secondary" onclick="showUserManager()">管理用户</button>
      <button class="btn btn-secondary" onclick="showDatabase()">数据库</button>
      <button class="btn btn-danger" onclick="resetTable()">重置数据</button>
      <button class="btn btn-danger" onclick="logout()">退出</button>
    </div>
  </div>

  <!-- 风险报表区域 -->
  <div class="card" id="riskSection">
    <div class="card-title">风险报表

        <option value="user">用户</option>

      <span>赔率：</span><input type="number" id="multipleVal" value="47" step="1" style="width:50px;">
      <span id="numberTotalBox" style="display:none;margin-left:10px;">总注数金额：<span id="numberTotalAmount">0</span></span>
      <span id="zodiacTotalBox" style="display:none;margin-left:10px;">生肖加权：<span id="zodiacTotalAmount">0</span></span>
    </div>
    <div style="overflow-x:auto;">
      <table id="riskTable" onclick="handleTableRowClick(event)">

      <span>赔率：</span><input type="number" id="reportMultipleVal" value="47" step="1" style="width:50px;">

  <!-- 次数统计卡片 -->
  <div class="card">
    <div class="card-title">下单次数统计</div>

      <table id="numberFreqTable"></table>
      <table id="zodiacFreqTable"></table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">金额有效次数统计</div>
    <div style="display:flex; gap:20px;">
      <table id="numberAmountFreqTable"></table>
      <table id="zodiacAmountFreqTable"></table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">上报金额统计 <span id="reportAmountTotalBox" style="display:none;">合计：<span id="reportAmountTotalValue">0</span></span></div>
    <table id="reportAmountTable"></table>
  </div>
</div>

<div id="storageInfo" style="display:none;">
  <span>订单数：<span id="orderCount">0</span></span>
  <span>已用空间：<span id="usedSpace">-</span></span>
  <span>可用空间：<span id="freeSpace">-</span></span>
</div>

<script>
// ========== API 通信 ==========
const API_BASE = '';
let authToken = localStorage.getItem('authToken') || null;
let currentUser = null;

async function fetchApi(url, options = {}) {
  const headers = {
    'Content-Type': 'application/json',
    ...(options.headers || {})
  };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(API_BASE + url, { ...options, headers });

  if (res.status === 401 || res.status === 403) {
    const data = await res.json().catch(() => ({}));
    if (data.needActivation) {
      throw new Error('NEED_ACTIVATION');
    }
    authToken = null;
    localStorage.removeItem('authToken');
    currentUser = null;
    const overlay = document.getElementById('loginOverlay');
    if (!overlay || overlay.style.display === 'none') {
      showLoginScreen();
    }
    throw new Error(data.error || '未登录');
  }

  if (!res.ok) {
    const error = await res.json().catch(() => ({ error: '网络错误' }));
    throw new Error(error.error || '网络错误');
  }
  return res.json();
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast-message';
  toast.textContent = msg;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
}

// ========== 自定义对话框 ==========
function showCustomDialog({ title = '提示', message = '', type = 'alert', defaultValue = '', placeholder = '' }) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div'); overlay.className = 'custom-dialog-overlay';
    overlay.innerHTML = `<div class="custom-dialog-box"><div class="custom-dialog-title">${title}</div><div class="custom-dialog-message">${message}</div>${type==='prompt'?`<input class="custom-dialog-input" type="text" value="${defaultValue}" placeholder="${placeholder}" id="custom-dialog-input">`:''}<div class="custom-dialog-buttons">${type==='confirm'||type==='prompt'?'<button class="custom-dialog-btn cancel" id="custom-dialog-cancel">取消</button>':''}<button class="custom-dialog-btn confirm" id="custom-dialog-confirm">确定</button></div></div>`;
    document.body.appendChild(overlay);
    const confirmBtn = overlay.querySelector('#custom-dialog-confirm'); const cancelBtn = overlay.querySelector('#custom-dialog-cancel'); const inputEl = overlay.querySelector('#custom-dialog-input');
    const close = (result) => { document.body.removeChild(overlay); resolve(result); };
    confirmBtn.onclick = () => { if (type === 'prompt') close(inputEl.value); else if (type === 'confirm') close(true); else close(undefined); };
    if (cancelBtn) cancelBtn.onclick = () => { if (type === 'confirm') close(false); else if (type === 'prompt') close(null); else close(undefined); };
    if (inputEl) { inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmBtn.click(); }); inputEl.focus(); }
  });
}
window.alert = async (msg) => { await showCustomDialog({ title: '提示', message: msg, type: 'alert' }); };
window.confirm = async (msg) => { return await showCustomDialog({ title: '请确认', message: msg, type: 'confirm' }); };
window.prompt = async (msg, def) => { return await showCustomDialog({ title: '请输入', message: msg, type: 'prompt', defaultValue: def }); };

// ========== 登录相关 ==========
function showLoginScreen() {
  const overlay = document.getElementById('loginOverlay');
  if (overlay) overlay.style.display = '';
  try {
    const saved = localStorage.getItem('savedCredentials');
    if (saved) {
      const cred = JSON.parse(saved);
      document.getElementById('loginUsername').value = cred.username || '';
      document.getElementById('loginPassword').value = cred.password || '';
      document.getElementById('rememberPwd').checked = true;
    }
  } catch(e) {}
  document.getElementById('loginFormView').style.display = '';
  document.getElementById('registerFormView').style.display = 'none';
  document.getElementById('activateFormView').style.display = 'none';
  document.getElementById('adminLoginArea').style.display = 'none';
  document.getElementById('loginError').textContent = '';
}

document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const remember = document.getElementById('rememberPwd').checked;
  if (!username || !password) {
    document.getElementById('loginError').textContent = '请输入用户名和密码';
    return;
  }
  try {
    const data = await fetchApi('/api/auth/login', { method:'POST', body: JSON.stringify({ username, password }) });
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = { username: data.username, role: data.role };
    if (remember) {
      localStorage.setItem('savedCredentials', JSON.stringify({ username, password }));
    } else {
      localStorage.removeItem('savedCredentials');
    }
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    initMainSystem();
  } catch(e) {
    if (e.message === 'NEED_ACTIVATION') {
      document.getElementById('loginError').textContent = '账号未激活或已过期，请先激活';
      document.getElementById('actUsername').value = username;
      document.getElementById('loginFormView').style.display = 'none';
      document.getElementById('activateFormView').style.display = '';
      document.getElementById('activateError').textContent = '';
    } else {
      document.getElementById('loginError').textContent = e.message;
    }
  }
};

document.getElementById('showRegisterLink').onclick = () => {
  document.getElementById('loginFormView').style.display = 'none';
  document.getElementById('registerFormView').style.display = '';
  document.getElementById('activateFormView').style.display = 'none';
  document.getElementById('registerError').textContent = '';
};

document.getElementById('registerBtn').onclick = async () => {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  if (!username || !password) {
    document.getElementById('registerError').textContent = '请输入用户名和密码';
    return;
  }
  try {
    await fetchApi('/api/auth/register', { method:'POST', body: JSON.stringify({ username, password }) });
    document.getElementById('actUsername').value = username;
    document.getElementById('registerFormView').style.display = 'none';
    document.getElementById('activateFormView').style.display = '';
    document.getElementById('activateError').textContent = '注册成功，请输入激活码激活';
  } catch(e) {
    document.getElementById('registerError').textContent = e.message;
  }
};

document.getElementById('activateBtn').onclick = async () => {
  const username = document.getElementById('actUsername').value.trim();
  const cardCode = document.getElementById('actCode').value.trim();
  if (!username || !cardCode) {
    document.getElementById('activateError').textContent = '请输入激活码';
    return;
  }
  try {
    await fetchApi('/api/auth/activate', { method:'POST', body: JSON.stringify({ username, cardCode }) });
    document.getElementById('activateFormView').style.display = 'none';
    document.getElementById('loginFormView').style.display = '';
    document.getElementById('loginUsername').value = username;
    document.getElementById('loginError').textContent = '激活成功，请登录';
  } catch(e) {
    document.getElementById('activateError').textContent = e.message;
  }
};

document.getElementById('showAdminLoginLink').onclick = () => {
  const area = document.getElementById('adminLoginArea');
  if (area.style.display === 'none') {
    area.style.display = '';
    document.getElementById('adminPassword').focus();
  } else {
    area.style.display = 'none';
  }
};

document.getElementById('adminLoginConfirmBtn').onclick = async () => {
  const password = document.getElementById('adminPassword').value.trim();
  if (!password) {
    document.getElementById('loginError').textContent = '请输入管理员密码';
    return;
  }
  try {
    const data = await fetchApi('/api/auth/admin', { method:'POST', body: JSON.stringify({ password }) });
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = { username: 'admin', role: 'admin' };
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    initMainSystem();
  } catch(e) {
    document.getElementById('loginError').textContent = e.message;
  }
};

document.getElementById('backToLoginFromReg').onclick = showLoginScreen;
document.getElementById('backToLoginFromAct').onclick = showLoginScreen;

function logout() {
  authToken = null;
  localStorage.removeItem('authToken');
  currentUser = null;
  location.reload();
}

// ========== 全局变量（业务相关，在第二段初始化） ==========
let currentZodiacMap = {};
const redNumbers = ['01','02','07','08','12','13','18','19','23','24','29','30','34','35','40','45','46'];
const blueNumbers = ['03','04','09','10','14','15','20','25','26','31','36','37','41','42','47','48'];
const greenNumbers = ['05','06','11','16','17','21','22','27','28','32','33','38','39','43','44','49'];
const zodiacOrder = ['马','蛇','龙','兔','虎','牛','鼠','猪','狗','鸡','猴','羊'];
let highestZ = 2000;
</script>
<script>
// ========== 工具函数 ==========
function getTodayCST() {
  const now = new Date();
  const offset = 8*60;
  const localTime = now.getTime() + (now.getTimezoneOffset() + offset) * 60000;
  const cstDate = new Date(localTime);
  return `${cstDate.getFullYear()}-${String(cstDate.getMonth()+1).padStart(2,'0')}-${String(cstDate.getDate()).padStart(2,'0')}`;
}

function buildZodiacMap(startZodiac) {
  const map = {};
  const startIndex = zodiacOrder.indexOf(startZodiac);
  const idx = startIndex !== -1 ? startIndex : 0;
  for (let i=1; i<=49; i++) map[i.toString().padStart(2,'0')] = zodiacOrder[(idx+i-1)%12];
  return map;
}

async function changeStartZodiac() {
  const select = document.getElementById('startZodiacSelect');
  const newZodiac = select.value;
  const savedZodiac = localStorage.getItem('selectedStartZodiac') || '马';
  if (newZodiac === savedZodiac) return;
  const inputPwd = await prompt("请输入管理员密码以切换本年生肖：", "");
  if (!inputPwd) return;
  try {
    // 向后端验证管理员密码
    await fetchApi('/api/auth/admin', { method:'POST', body: JSON.stringify({ password: inputPwd }) });
    localStorage.setItem('selectedStartZodiac', newZodiac);
    currentZodiacMap = buildZodiacMap(newZodiac);
    updateStatistics();
    showToast('生肖起始已切换');
  } catch(e) {
    await alert("密码错误或权限不足");
    select.value = savedZodiac;
  }
}

function switchRiskReport() {
  const val = document.getElementById('riskReportSwitcher').value;
  if (val === 'total') {
    document.getElementById('riskSection').style.display = '';
    document.getElementById('reportSection').style.display = 'none';
    document.getElementById('viewUserSelect').style.display = 'none';
    generateRiskTable();
  } else if (val === 'user') {
    document.getElementById('riskSection').style.display = '';
    document.getElementById('reportSection').style.display = 'none';
    document.getElementById('viewUserSelect').style.display = 'inline-block';
    generateRiskTable();
  } else if (val === 'report') {
    document.getElementById('riskSection').style.display = 'none';
    document.getElementById('reportSection').style.display = '';
    generateReportTable();
  }
}

// ========== 用户管理（localStorage） ==========
function getUsers() { return JSON.parse(localStorage.getItem('users') || '[]'); }
function saveUsers(users) { localStorage.setItem('users', JSON.stringify(users)); }
function addUser(name) { const users = getUsers(); if (users.includes(name)) { showToast('用户已存在'); return false; } users.push(name); saveUsers(users); return true; }
async function deleteUser(name) { let users = getUsers(); users = users.filter(u => u !== name); saveUsers(users); updateSelects(); updateStatistics(); }
function updateSelects() {
  const users = getUsers();
  const orderSel = document.getElementById('orderUserSelect');

function countItemsInLine(line, cfg) {
  const m = line.match(/([\u4e00-\u9fa5\d\-]+)\s+各数\s+(\d+)/);
  if (!m) return { numbers:[], zodiacs:[], amount:0 };
  let cont = m[1]; const amt = parseInt(m[2]) || 0;
  const items = cont.split('-').map(i => i.trim()).filter(i => i);
  const nums = new Set();
  const zods = new Set();
  items.forEach(item => {
    if (/^\d+$/.test(item)) {
      nums.add(item.padStart(2,'0'));
    } else if (cfg.shengxiaoAttr && cfg.shengxiaoAttr[item]) {
      cfg.shengxiaoAttr[item].forEach(z => zods.add(z));
    } else if (cfg.zodiac && cfg.zodiac[item]) {
      zods.add(item);
    } else {
      const sources = [cfg.wuxing, cfg.bose, cfg.banbo, cfg.danshuang, cfg.weishu, cfg.daxiaodanshuang, cfg.daxiao, cfg.heshu, cfg.toushu, cfg.menshu, cfg.duanwei, cfg.hedahexiao, cfg.weidaweixiao, cfg.hewei, cfg.heshudanshuang, cfg.toushuDanshuang, cfg.zodiac];
      for (const src of sources) {
        if (src && src[item]) { src[item].forEach(n => nums.add(String(n).padStart(2,'0'))); break; }
      }
    }
  });
  return { numbers: [...nums], zodiacs: [...zods], amount: amt };
}

function updateOrderTotalDisplay() {
  const re = document.getElementById('orderResult');

  let total = 0;
  lines.forEach(line => {

    let cnt = numbers.length;
    zodiacs.forEach(z => { cnt += (cfg.zodiac[z] || []).length; });
    if (cnt > 0) total += cnt * amount;
  });

  box.style.display = 'inline-flex';
}

// ========== 统计数据与风险表格 ==========
async function updateStatistics() {
  const date = document.getElementById('filterDate')?.value;
  try {
    const orders = await fetchApi('/api/orders' + (date ? `?date=${date}` : ''));
    const reports = await fetchApi('/api/report-orders' + (date ? `?date=${date}` : ''));
    const cfg = getAllConfigData();
    const tableBetData = {}, userBetData = {}, reportBetData = {}, reportAmountData = {};
    const numberCount = {}, zodiacCount = {}, numberAmountCount = {}, zodiacAmountCount = {};
    const nMin = parseInt(document.getElementById('numAmountMin')?.value) || 1;
    const nMax = parseInt(document.getElementById('numAmountMax')?.value) || 50000;
    const zMin = parseInt(document.getElementById('zodiacAmountMin')?.value) || 1;
    const zMax = parseInt(document.getElementById('zodiacAmountMax')?.value) || 50000;
    const curZod = localStorage.getItem('selectedStartZodiac') || '马';
    let numberOrderTotal = 0, zodiacWeightedTotal = 0;

    orders.forEach(order => {
      if (!userBetData[order.user]) userBetData[order.user] = {};
      order.content.split('\n').filter(l => l.trim()).forEach(line => {
        const { numbers, zodiacs, amount } = countItemsInLine(line, cfg);
        if (zodiacs.length > 0) {
          zodiacs.forEach(z => { const w = z === curZod ? 5 : 4; zodiacWeightedTotal += amount * w; });
        } else if (numbers.length > 0) {
          numberOrderTotal += numbers.length * amount;
        }
        numbers.forEach(num => {
          userBetData[order.user][num] = (userBetData[order.user][num] || 0) + amount;
          tableBetData[num] = (tableBetData[num] || 0) + amount;
          reportBetData[num] = (reportBetData[num] || 0) + amount;
          numberCount[num] = (numberCount[num] || 0) + 1;
          if (amount >= nMin && amount <= nMax) numberAmountCount[num] = (numberAmountCount[num] || 0) + 1;
        });
        zodiacs.forEach(z => {
          zodiacCount[z] = (zodiacCount[z] || 0) + 1;
          if (amount >= zMin && amount <= zMax) zodiacAmountCount[z] = (zodiacAmountCount[z] || 0) + 1;
          (cfg.zodiac[z] || []).forEach(n => {
            const num = n.padStart(2,'0');
            userBetData[order.user][num] = (userBetData[order.user][num] || 0) + amount;
            tableBetData[num] = (tableBetData[num] || 0) + amount;
            reportBetData[num] = (reportBetData[num] || 0) + amount;
          });
        });
      });
    });

    reports.forEach(order => {
      order.content.split('\n').filter(l => l.trim()).forEach(line => {
        const { numbers, zodiacs, amount } = countItemsInLine(line, cfg);
        numbers.forEach(num => {
          if (userBetData[order.user]) userBetData[order.user][num] = (userBetData[order.user][num] || 0) - amount;
          reportBetData[num] = (reportBetData[num] || 0) - amount;
          reportAmountData[num] = (reportAmountData[num] || 0) + amount;
        });
        zodiacs.forEach(z => {
          (cfg.zodiac[z] || []).forEach(n => {
            const num = n.padStart(2,'0');
            if (userBetData[order.user]) userBetData[order.user][num] = (userBetData[order.user][num] || 0) - amount;
            reportBetData[num] = (reportBetData[num] || 0) - amount;
            reportAmountData[num] = (reportAmountData[num] || 0) + amount;
          });
        });
      });
    });

    // 更新全局缓存
    window._cachedTableBetData = tableBetData;
    window._cachedUserBetData = userBetData;
    window._cachedReportBetData = reportBetData;
    window._cachedReportAmountData = reportAmountData;
    window._cachedNumberCount = numberCount;
    window._cachedZodiacCount = zodiacCount;
    window._cachedNumberAmountCount = numberAmountCount;
    window._cachedZodiacAmountCount = zodiacAmountCount;

    // 显示数字总数和生肖加权数
    document.getElementById('numberTotalAmount').textContent = numberOrderTotal;
    document.getElementById('numberTotalBox').style.display = numberOrderTotal > 0 ? 'inline-flex' : 'none';
    document.getElementById('zodiacTotalAmount').textContent = zodiacWeightedTotal;
    document.getElementById('zodiacTotalBox').style.display = zodiacWeightedTotal > 0 ? 'inline-flex' : 'none';

    // 刷新所有表格
    generateRiskTable();
    generateReportTable();
    renderFrequencyCards();
    renderAmountFrequencyCards();
    renderReportAmountTable();
    updateReportAmountTotal();
    document.getElementById('orderCount').textContent = orders.length + reports.length;
  } catch(e) {
    console.error(e);
    showToast('加载数据失败');
  }
}

function generateRiskTable() {
  const sw = document.getElementById('riskReportSwitcher')?.value;
  let data;
  if (sw === 'total') data = window._cachedTableBetData || {};
  else if (sw === 'user') {
    const u = document.getElementById('viewUserSelect')?.value;
    data = (window._cachedUserBetData && window._cachedUserBetData[u]) || {};
  } else data = window._cachedReportBetData || {};

  const tbody = document.getElementById('tableBody');
  if (!tbody) return;
  tbody.innerHTML = '';
  let total = 0;
  const mul = parseFloat(document.getElementById('multipleVal')?.value) || 47;
  const rr = parseFloat(document.getElementById('rebateRate')?.value) || 4;
  let list = [];
  for (let n in data) { const b = data[n]; total += b; list.push({ num: n, bet: b }); }
  for (let i = 1; i <= 49; i++) { const n = i.toString().padStart(2,'0'); if (!(n in data)) list.push({ num: n, bet: 0 }); }
  list.sort((a,b) => b.bet - a.bet);
  const reb = (total * rr / 100).toFixed(2);
  list.forEach((item, idx) => {
    const { num, bet } = item;
    const risk = Math.round(total - bet * mul - parseFloat(reb));
    const cls = redNumbers.includes(num) ? 'red-text' : (blueNumbers.includes(num) ? 'blue-text' : 'green-text');
    const tr = document.createElement('tr');
    tr.className = cls;
    tr.innerHTML = `<td>${num}${currentZodiacMap[num]||''}</td><td>${bet}</td><td>${risk}</td><td>${num}</td><td>${idx+1}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('totalBet').textContent = total;
  document.getElementById('totalRebate').textContent = reb;
}

function applyReportCap() { generateReportTable(); }
function generateReportTable() {
  const cap = document.getElementById('reportCapInput');
  let cv = parseFloat(cap?.value);
  if (isNaN(cv) || cv <= 0) cap.value = '';
  const data = window._cachedReportBetData || {};
  const tbody = document.getElementById('reportTableBody');
  if (!tbody) return;
  tbody.innerHTML = '';
  const mul = parseFloat(document.getElementById('reportMultipleVal')?.value) || 47;
  const rr = parseFloat(document.getElementById('reportRebateRate')?.value) || 4;
  let total = 0;
  let list = [];
  for (let n in data) { let b = data[n]; if (!isNaN(cv) && cv > 0 && b > cv) b = cv; total += b; list.push({ num: n, bet: b }); }
  for (let i = 1; i <= 49; i++) { const n = i.toString().padStart(2,'0'); if (!(n in data)) list.push({ num: n, bet: 0 }); }
  list.sort((a,b) => b.bet - a.bet);
  const reb = (total * rr / 100).toFixed(2);
  list.forEach((item, idx) => {
    const { num, bet } = item;
    const risk = Math.round(total - bet * mul - parseFloat(reb));
    const cls = redNumbers.includes(num) ? 'red-text' : (blueNumbers.includes(num) ? 'blue-text' : 'green-text');
    const tr = document.createElement('tr');
    tr.className = cls;
    tr.innerHTML = `<td>${num}${currentZodiacMap[num]||''}</td><td>${bet}</td><td>${risk}</td><td>${num}</td><td>${idx+1}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('reportTotalBet').textContent = total;
  document.getElementById('reportTotalRebate').textContent = reb;
  const info = document.getElementById('reportCapInfo');
  if (!isNaN(cv) && cv > 0) {
    const exc = [];
    for (let n in data) { if (data[n] > cv) exc.push({ num: n, exceed: data[n] - cv }); }
    if (exc.length > 0) {
      exc.sort((a,b) => a.exceed - b.exceed);
      let txt = ''; let te = 0;
      exc.forEach(x => { txt += `${x.num}各${x.exceed}米<br>`; te += x.exceed; });
      txt += `合计${te}`;
      info.innerHTML = txt;
    } else { info.textContent = '无超出的号码'; }
  } else { info.textContent = ''; }
}

function getNumberListForCategory(cat, cfg) {
  const nums = new Set();
  if (cfg.shengxiaoAttr && cfg.shengxiaoAttr[cat]) {
    cfg.shengxiaoAttr[cat].forEach(z => {
      if (cfg.zodiac[z]) cfg.zodiac[z].forEach(n => nums.add(n.padStart(2,'0')));
    });
  }
  const sources = [cfg.wuxing, cfg.bose, cfg.banbo, cfg.danshuang, cfg.weishu, cfg.daxiaodanshuang, cfg.daxiao, cfg.heshu, cfg.toushu, cfg.menshu, cfg.duanwei, cfg.hedahexiao, cfg.weidaweixiao, cfg.hewei, cfg.heshudanshuang, cfg.toushuDanshuang, cfg.zodiac];
  for (const src of sources) {
    if (src && src[cat]) {
      src[cat].forEach(n => nums.add(String(n).padStart(2,'0')));
    }
  }
  return [...nums];
}

async function applyPrizeFilter() {
  const di = document.getElementById('recordDateFilter'), pi = document.getElementById('prizeNumberInput'), uf = document.getElementById('recordUserFilter');
  if (!di || !pi || !uf) return;
  const date = di.value, pn = pi.value.trim(), uv = uf.value;
  try {
    const recs = await fetchApi('/api/orders' + (date ? `?date=${date}` : ''));
    let filtered = uv === 'all' ? recs : recs.filter(r => r.user === uv);
    const cfg = getAllConfigData();
    if (pn) {
      const t = pn.padStart(2,'0');
      filtered = filtered.filter(r => {
        return r.content.split('\n').some(line => {
          const m = line.match(/^(.+?)\s+各数\s+(\d+)$/);
          if (!m) return false;
          const parts = m[1].split('-');
          return parts.some(p => {
            if (/^\d{1,2}$/.test(p)) return p.padStart(2,'0') === t;
            const nums = getNumberListForCategory(p, cfg);
            return nums.includes(t);
          });
        });
      });
    }
    const cont = document.getElementById('orderListContainer');
    if (!cont) return;
    if (filtered.length === 0) { cont.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">暂无匹配订单</div>'; return; }
    cont.innerHTML = filtered.map(it => {
      const ts = new Date(it.timestamp).toLocaleString('zh-CN', { hour12: false });
      return `<div class="order-item"><input type="checkbox" class="order-check" data-id="${it.id}"><div class="order-content">${it.content.replace(/\n/g,'<br>')}</div><div class="order-info"><span class="order-total">合计：${it.totalAmount||0}</span><span class="order-meta"><span style="color:blue;">用户：${it.user}</span> &nbsp; ${ts}</span></div><button class="order-del" onclick="deleteOrderRecord(${it.id})">删除</button></div>`;
    }).join('');
  } catch(e) { showToast('刷新失败'); }
}

// ========== 窗口工具 ==========
function makeWindowDraggable(winId) {
  const win = document.getElementById(winId); if (!win) return;
  const header = win.querySelector('.modal-header'); if (!header) return;
  let isDragging = false, startX, startY, startLeft, startTop;
  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('.window-controls')) return;
    isDragging = true;
    const rect = win.getBoundingClientRect();
    startX = e.clientX; startY = e.clientY;
    startLeft = rect.left; startTop = rect.top;
    win.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    win.style.left = (startLeft + e.clientX - startX) + 'px';
    win.style.top = (startTop + e.clientY - startY) + 'px';
    win.style.transform = 'none';
  });
  document.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; win.style.cursor = ''; } });
  win.addEventListener('mousedown', () => { highestZ += 1; win.style.zIndex = highestZ; });
}

function maximizeWindow(winId) {
  const win = document.getElementById(winId);
  if (!win) return;
  const isMaximized = win.getAttribute('data-maximized') === 'true';
  if (isMaximized) {
    const origWidth = win.getAttribute('data-orig-width');
    const origHeight = win.getAttribute('data-orig-height');
    const origLeft = win.getAttribute('data-orig-left');
    const origTop = win.getAttribute('data-orig-top');
    const origTransform = win.getAttribute('data-orig-transform');
    if (origWidth) win.style.width = origWidth;
    if (origHeight) win.style.height = origHeight;
    if (origLeft) win.style.left = origLeft;
    if (origTop) win.style.top = origTop;
    if (origTransform !== null) win.style.transform = origTransform;
    win.style.right = '';
    win.style.bottom = '';
    win.setAttribute('data-maximized', 'false');
    win.style.resize = 'both';
    win.style.overflow = 'auto';
  } else {
    const rect = win.getBoundingClientRect();
    win.setAttribute('data-orig-width', win.style.width || (rect.width + 'px'));
    win.setAttribute('data-orig-height', win.style.height || (rect.height + 'px'));
    win.setAttribute('data-orig-left', win.style.left || (rect.left + 'px'));
    win.setAttribute('data-orig-top', win.style.top || (rect.top + 'px'));
    win.setAttribute('data-orig-transform', win.style.transform || '');
    win.style.left = '0';
    win.style.top = '0';
    win.style.right = '0';
    win.style.bottom = '0';
    win.style.width = 'auto';
    win.style.height = 'auto';
    win.style.transform = 'none';
    win.setAttribute('data-maximized', 'true');
    win.style.resize = 'none';
    win.style.overflow = 'auto';
  }
}

function pinWindow(winId) {
  const win = document.getElementById(winId);
  if (win) { highestZ += 1; win.style.zIndex = highestZ; }
}

  if (fd) fd.value = getTodayCST();
}

window.onload = async () => {
  try {
    const saved = localStorage.getItem('savedCredentials');
    if (saved) {
      const cred = JSON.parse(saved);
      document.getElementById('loginUsername').value = cred.username || '';
      document.getElementById('loginPassword').value = cred.password || '';
      document.getElementById('rememberPwd').checked = true;
    }
  } catch(e) {}
  if (authToken) {
    try {
      await loadServerConfig();
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display = '';
      initMainSystem();
    } catch(e) {
      document.getElementById('loginOverlay').style.display = '';
      document.getElementById('mainContent').style.display = 'none';
    }
  } else {
    document.getElementById('loginOverlay').style.display = '';
    document.getElementById('mainContent').style.display = 'none';
  }
};
</script>
</body>
</html>
