<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>配置弹窗 · 稳定版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "微软雅黑", SimSun, sans-serif;
            font-size: 12px;
        }
        body {
            background: #e4e4e4;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-mask {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal {
            width: 920px;
            height: 620px;
            background: #fff;
            border: 1px solid #999;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            height: 32px;
            background: linear-gradient(to bottom, #f9f9f9, #e9e9e9);
            border-bottom: 1px solid #a0a0a0;
            display: flex;
            align-items: center;
            padding: 0 8px;
        }
        .modal-header .icon {
            width: 20px;
            height: 20px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            margin-right: 8px;
        }
        .modal-header .title {
            font-weight: bold;
            font-size: 13px;
            flex-grow: 1;
        }
        .modal-header .controls button {
            width: 26px;
            height: 22px;
            background: transparent;
            border: 1px solid transparent;
            margin-left: 2px;
            cursor: pointer;
            font-size: 14px;
            color: #555;
        }
        .tabs {
            height: 32px;
            background: #f0f0f0;
            border-bottom: 1px solid #a0a0a0;
            display: flex;
            align-items: flex-end;
            padding-left: 10px;
        }
        .tab {
            padding: 6px 20px;
            border: 1px solid #a0a0a0;
            border-bottom: none;
            background: linear-gradient(to bottom, #f9f9f9, #e0e0e0);
            margin-right: 4px;
            cursor: pointer;
            position: relative;
            top: 1px;
        }
        .tab.active {
            background: #fff;
            border-bottom: 1px solid #fff;
            font-weight: bold;
            color: #c00;
        }
        .content {
            flex: 1;
            padding: 10px;
            overflow: hidden;
            display: none;
            flex-direction: column;
        }
        .content.active {
            display: flex;
        }
        .toolbar {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 5px;
        }
        .toolbar button,
        .toolbar select,
        .toolbar input {
            height: 24px;
            border: 1px solid #a0a0a0;
            background: linear-gradient(to bottom, #f9f9f9, #e9e9e9);
            padding: 0 8px;
            font-size: 12px;
        }
        .toolbar input {
            width: 180px;
            background: #fff;
        }
        .table-wrapper {
            flex: 1;
            border: 1px solid #a0a0a0;
            overflow: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: linear-gradient(to bottom, #f9f9f9, #e0e0e0);
            position: sticky;
            top: 0;
        }
        th,
        td {
            border: 1px solid #d0d0d0;
            padding: 6px 10px;
            text-align: left;
            white-space: nowrap;
        }
        tbody tr:hover {
            background-color: #e8f4ff;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tbody tr.selected {
            background-color: #b8daff !important;
            outline: 1px solid #4a90e2;
            outline-offset: -1px;
        }
        #odds-content .footer {
            margin-top: 10px;
            border-top: 1px solid #a0a0a0;
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #odds-content .footer label {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #odds-content .footer input[type="text"] {
            height: 22px;
            width: 140px;
            padding: 0 4px;
        }
        #odds-content .footer button {
            height: 24px;
            padding: 0 15px;
            border: 1px solid #a0a0a0;
            background: linear-gradient(to bottom, #f9f9f9, #e9e9e9);
            cursor: pointer;
        }
        #odds-content .footer button.confirm {
            background: linear-gradient(to bottom, #337ab7, #286090);
            color: white;
            border-color: #204d74;
            margin-left: 20px;
        }
        #odds-content .instructions {
            margin-top: 10px;
            padding: 8px;
            background: #fff8e1;
            border: 1px solid #ffe082;
            line-height: 1.6;
            color: #555;
        }
        .red {
            color: #d32f2f;
            font-weight: bold;
        }
        .name-text {
            display: inline-block;
            width: 100%;
            padding: 2px 4px;
        }
        .name-input {
            width: 100%;
            border: 1px solid #4a90e2;
            display: none;
            padding: 2px 4px;
        }
        .name-input.editing {
            display: inline-block;
        }
        .name-text.editing {
            display: none;
        }
        .applicant-footer {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
        }
        .applicant-footer button {
            height: 24px;
            padding: 0 20px;
            border: 1px solid #a0a0a0;
            background: linear-gradient(to bottom, #4a90e2, #2a70c2);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        #btn-delete-applicant {
            color: #c00;
        }
        #btn-delete-applicant:hover {
            background: linear-gradient(to bottom, #fdd, #fcc);
            border-color: #c00;
        }
    </style>
</head>
<body>
    <div class="modal-mask">
        <div class="modal">
            <div class="modal-header">
                <div class="icon">S</div>
                <div class="title">配置</div>
                <div class="controls">
                    <button>─</button>
                    <button>□</button>
                    <button class="close">×</button>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="odds">赔率/返水</div>
                <div class="tab" data-tab="applicant">申报人</div>
                <div class="tab">导入/导出秘钥</div>
            </div>

            <!-- 赔率/返水页 -->
            <div class="content active" id="odds-content">
                <div class="toolbar">
                    <button id="btn-add-scheme">+</button>
                    <button id="btn-del-scheme">-</button>
                    <select id="scheme-select"></select>
                    <input type="text" id="input-bet-type" placeholder="输入投注类型">
                    <input type="text" id="input-odds" placeholder="赔率: 输入赔率">
                    <input type="text" id="input-rebate" placeholder="返水: 输入返水0-100">
                    <button id="btn-add-row">添加</button>
                    <button id="btn-del-row">删除</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>投注类型</th><th>赔率</th><th>返水</th></tr>
                        </thead>
                        <tbody id="odds-tbody"></tbody>
                    </table>
                </div>
                <div class="footer">
                    <div>
                        <label><input type="checkbox" id="chk-rename"> 修改赔率名称:</label>
                        <input type="text" id="input-rename" placeholder="输入新名称">
                        <button id="btn-rename-confirm">确认</button>
                    </div>
                    <div>
                        <label><input type="checkbox" id="chk-unify"> 设置统一返水:</label>
                        <input type="text" id="input-unify-rebate" placeholder="输入返水比例">
                        <button id="btn-unify-confirm">确认</button>
                        <button class="confirm" id="btn-odds-confirm">确认</button>
                    </div>
                </div>
                <div class="instructions">
                    赔率：1赔多少，如1:2则输入2。返水：百分比，6%输入6。千分之6输入0.6。<br>
                    <span class="red">内置支持玩法不能删除。</span>
                </div>
            </div>

            <!-- 申报人页 -->
            <div class="content" id="applicant-content">
                <div class="toolbar">
                    <button id="btn-add-applicant">添加申报人</button>
                    <button id="btn-delete-applicant" onclick="window.deleteApplicant()">删除申报人</button>
                    <input type="text" id="new-applicant-name" placeholder="此处输入要添加的申报人">
                </div>
                <div style="display:flex; gap:10px; flex:1; overflow:hidden;">
                    <div style="flex:3; border:1px solid #a0a0a0; overflow:auto;">
                        <table>
                            <thead><tr><th style="width:40%">申报人</th><th style="width:60%">赔率配置</th></tr></thead>
                            <tbody id="applicant-tbody"></tbody>
                        </table>
                    </div>
                    <div style="flex:1; border:1px solid #a0a0a0; padding:10px; background:#f9f9f9; overflow:auto;">
                        <strong>说明：</strong><br><br>
                        <span class="red">请至少设置一个申报人。</span><br><br>
                        双击名称可编辑；单击行空白区域选中/取消选中（单选）。<br>
                        选中后点击“删除申报人”或按Delete键删除。
                    </div>
                </div>
                <div class="applicant-footer">
                    <button id="btn-confirm-applicant">确认</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 选项卡切换（通用）
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const type = this.dataset.tab;
                if (!type) return;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                document.getElementById(type + '-content').classList.add('active');
            });
        });

        // ========== 赔率/返水页（安全模式，无错误） ==========
        (function() {
            const schemes = [{
                name: '47倍计算',
                rows: [
                    { type: '特码', odds: '47.0', rebate: '4.0' },
                    { type: '平特一肖', odds: '2.0', rebate: '4.0' },
                    { type: '平特一肖带主肖', odds: '1.8', rebate: '4.0' },
                    { type: '二连肖', odds: '4.0', rebate: '4.0' },
                    { type: '三连肖', odds: '10.0', rebate: '4.0' },
                    { type: '四连肖', odds: '30.0', rebate: '4.0' },
                    { type: '五连肖', odds: '100.0', rebate: '4.0' },
                    { type: '二连肖带主肖', odds: '3.5', rebate: '4.0' },
                    { type: '三连肖带主肖', odds: '9.0', rebate: '4.0' }
                ]
            }];
            let current = 0;
            let selectedOddsRow = null;

            const schemeSelect = document.getElementById('scheme-select');
            const oddsTbody = document.getElementById('odds-tbody');

            function renderSchemeOptions() {
                schemeSelect.innerHTML = '';
                schemes.forEach((s, i) => {
                    const o = document.createElement('option');
                    o.value = i;
                    o.textContent = s.name;
                    if (i === current) o.selected = true;
                    schemeSelect.appendChild(o);
                });
            }

            function renderOddsTable() {
                oddsTbody.innerHTML = '';
                schemes[current].rows.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${r.type}</td><td>1:${r.odds}</td><td>${r.rebate}%</td>`;
                    oddsTbody.appendChild(tr);
                });
                selectedOddsRow = null;
            }

            schemeSelect.addEventListener('change', function() {
                current = parseInt(this.value, 10);
                renderOddsTable();
            });

            document.getElementById('btn-add-scheme').addEventListener('click', function() {
                const src = schemes[current];
                let newName = src.name + '_副本';
                let count = 1;
                while (schemes.some(s => s.name === newName)) {
                    newName = src.name + '_副本' + (++count);
                }
                schemes.push({ name: newName, rows: src.rows.map(r => ({ ...r })) });
                current = schemes.length - 1;
                renderSchemeOptions();
                renderOddsTable();
            });

            document.getElementById('btn-del-scheme').addEventListener('click', function() {
                if (schemes.length <= 1) {
                    alert('至少保留一个配置方案。');
                    return;
                }
                if (!confirm(`确定删除方案“${schemes[current].name}”？`)) return;
                schemes.splice(current, 1);
                if (current >= schemes.length) current = schemes.length - 1;
                renderSchemeOptions();
                renderOddsTable();
            });

            oddsTbody.addEventListener('click', function(e) {
                const tr = e.target.closest('tr');
                if (!tr) return;
                if (selectedOddsRow) selectedOddsRow.classList.remove('selected');
                tr.classList.add('selected');
                selectedOddsRow = tr;
            });

            document.getElementById('btn-add-row').addEventListener('click', function() {
                const type = document.getElementById('input-bet-type').value.trim();
                const odds = document.getElementById('input-odds').value.trim();
                const rebate = document.getElementById('input-rebate').value.trim();
                if (!type || !odds || !rebate) return alert('请完整填写信息');
                if (isNaN(parseFloat(odds)) || isNaN(parseFloat(rebate))) return alert('赔率和返水必须为数字');
                schemes[current].rows.push({ type, odds, rebate });
                renderOddsTable();
                document.getElementById('input-bet-type').value = '';
                document.getElementById('input-odds').value = '';
                document.getElementById('input-rebate').value = '';
            });

            document.getElementById('btn-del-row').addEventListener('click', function() {
                if (!selectedOddsRow) return alert('请先在表格中选中一行');
                const idx = Array.from(oddsTbody.children).indexOf(selectedOddsRow);
                if (idx === -1) return;
                if (!confirm(`删除“${schemes[current].rows[idx].type}”？`)) return;
                schemes[current].rows.splice(idx, 1);
                renderOddsTable();
            });

            document.getElementById('btn-rename-confirm').addEventListener('click', function() {
                if (!document.getElementById('chk-rename').checked) return alert('请先勾选复选框');
                const newName = document.getElementById('input-rename').value.trim();
                if (!newName) return alert('名称不能为空');
                if (schemes.some(s => s.name === newName)) return alert('名称已存在');
                schemes[current].name = newName;
                renderSchemeOptions();
                document.getElementById('input-rename').value = '';
                document.getElementById('chk-rename').checked = false;
            });

            document.getElementById('btn-unify-confirm').addEventListener('click', function() {
                if (!document.getElementById('chk-unify').checked) return alert('请先勾选复选框');
                const rebate = document.getElementById('input-unify-rebate').value.trim();
                if (rebate === '' || isNaN(parseFloat(rebate))) return alert('请输入有效数字');
                schemes[current].rows.forEach(r => r.rebate = rebate);
                renderOddsTable();
                document.getElementById('input-unify-rebate').value = '';
                document.getElementById('chk-unify').checked = false;
            });

            document.getElementById('btn-odds-confirm').addEventListener('click', function() {
                alert('赔率配置已保存（控制台可查看）');
                console.log('赔率方案:', JSON.parse(JSON.stringify(schemes)));
            });

            renderSchemeOptions();
            renderOddsTable();
        })();

        // ========== 申报人页（全局变量+onclick内联，保证可靠） ==========
        window.applicants = [];
        window.selectedApplicantId = null;
        window.nextApplicantId = 1;

        // 初始化数据
        ['张三', '01群', '02群', '03群', '04群', '05群', '06群', '07群', '08群', '09群'].forEach(name => {
            window.applicants.push({ id: window.nextApplicantId++, name: name, oddsConfig: '47倍无水' });
        });

        const STD_ODDS = ['47倍无水', '47倍3水', '47倍4水', '47倍5水', '47倍6水'];

        // 渲染函数挂到window，确保可访问
        window.renderApplicants = function() {
            const tbody = document.getElementById('applicant-tbody');
            tbody.innerHTML = '';
            window.applicants.forEach(a => {
                const tr = document.createElement('tr');
                tr.dataset.id = a.id;
                if (a.id === window.selectedApplicantId) tr.classList.add('selected');

                // 名称列
                const tdName = document.createElement('td');
                const span = document.createElement('span');
                span.className = 'name-text';
                span.textContent = a.name || '（空）';
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'name-input';
                input.value = a.name;

                span.addEventListener('dblclick', () => {
                    span.classList.add('editing');
                    input.classList.add('editing');
                    input.focus();
                    input.select();
                });
                input.addEventListener('blur', () => {
                    span.classList.remove('editing');
                    input.classList.remove('editing');
                    const v = input.value.trim();
                    if (v && v !== a.name) {
                        a.name = v;
                        span.textContent = v;
                    } else {
                        input.value = a.name;
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') input.blur();
                    if (e.key === 'Escape') {
                        input.value = a.name;
                        input.blur();
                    }
                });
                tdName.appendChild(span);
                tdName.appendChild(input);
                tr.appendChild(tdName);

                // 赔率配置列
                const tdOdds = document.createElement('td');
                const sel = document.createElement('select');
                const opts = [...STD_ODDS];
                if (!opts.includes(a.oddsConfig)) opts.unshift(a.oddsConfig);
                opts.forEach(o => {
                    const optEl = document.createElement('option');
                    optEl.value = o;
                    optEl.textContent = o;
                    if (o === a.oddsConfig) optEl.selected = true;
                    sel.appendChild(optEl);
                });
                sel.addEventListener('change', () => {
                    a.oddsConfig = sel.value;
                });
                tdOdds.appendChild(sel);
                tr.appendChild(tdOdds);

                tbody.appendChild(tr);
            });
        };

        // 行选中（事件委托）
        document.getElementById('applicant-tbody').addEventListener('click', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            const tr = e.target.closest('tr');
            if (!tr) return;
            const id = parseInt(tr.dataset.id, 10);
            if (isNaN(id)) return;
            if (window.selectedApplicantId === id) {
                window.selectedApplicantId = null;
            } else {
                window.selectedApplicantId = id;
            }
            window.renderApplicants();
        });

        // 删除函数挂在window上，供onclick调用
        window.deleteApplicant = function() {
            if (window.selectedApplicantId === null) {
                return alert('请先单击选中一个申报人行（蓝色高亮）。');
            }
            const applicant = window.applicants.find(a => a.id === window.selectedApplicantId);
            if (!applicant) {
                window.selectedApplicantId = null;
                window.renderApplicants();
                return;
            }
            if (!confirm(`确定要删除申报人“${applicant.name}”及其赔率配置吗？`)) return;
            window.applicants = window.applicants.filter(a => a.id !== window.selectedApplicantId);
            window.selectedApplicantId = null;
            window.renderApplicants();
            if (window.applicants.length === 0) {
                document.getElementById('new-applicant-name').focus();
            }
        };

        // 添加申报人
        document.getElementById('btn-add-applicant').addEventListener('click', function() {
            const input = document.getElementById('new-applicant-name');
            const name = input.value.trim();
            if (!name) return alert('请输入申报人名称');
            window.applicants.push({ id: window.nextApplicantId++, name: name, oddsConfig: '47倍无水' });
            input.value = '';
            window.selectedApplicantId = null;
            window.renderApplicants();
            const rows = document.querySelectorAll('#applicant-tbody tr');
            if (rows.length) rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // 回车添加
        document.getElementById('new-applicant-name').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('btn-add-applicant').click();
        });

        // 确认按钮
        document.getElementById('btn-confirm-applicant').addEventListener('click', function() {
            console.log('申报人数据:', JSON.parse(JSON.stringify(window.applicants)));
            alert(`申报人配置已保存，共 ${window.applicants.length} 人。`);
        });

        // Delete键删除
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' && document.getElementById('applicant-content').classList.contains('active')) {
                if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
                window.deleteApplicant();
            }
        });

        // 初始渲染
        window.renderApplicants();
    </script>
</body>
</html>
