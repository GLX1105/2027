<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>港澳识别系统 - 登录</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body {
  background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 50%, #ffd3b6 100%);
  display: flex; align-items: center; justify-content: center;
  height: 100vh; overflow: hidden;
}
.login-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(15px);
  border-radius: 24px;
  padding: 40px 30px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  width: 90%; max-width: 400px;
}
.login-card h1 {
  font-size: 28px; color: #2c3e50; margin-bottom: 8px;
  letter-spacing: 2px;
}
.login-subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 25px; }
input {
  width: 100%; padding: 12px; margin-bottom: 12px;
  border: 1px solid #ddd; border-radius: 10px;
  font-size: 15px; outline: none; background: #fff;
}
.login-btn {
  width: 100%; padding: 14px; margin-top: 5px;
  border: none; border-radius: 30px; font-size: 18px; font-weight: bold;
  cursor: pointer; color: #fff; background: #2ecc71;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: all 0.3s;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
.login-links { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
.login-link { font-size: 14px; color: #3498db; cursor: pointer; }
.login-link:hover { color: #2980b9; }
.login-error { color: #e74c3c; font-size: 13px; margin-bottom: 8px; min-height: 18px; }
.custom-dialog-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.custom-dialog-box {
  background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
  border-radius: 20px; padding: 25px 20px 20px;
  width: 90%; max-width: 400px; text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}
.custom-dialog-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color:#1a1a2e; }
.custom-dialog-message { font-size: 15px; color:#333; margin-bottom: 20px; line-height: 1.5; }
.custom-dialog-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 20px; outline: none; }
.custom-dialog-buttons { display: flex; gap: 10px; justify-content: center; }
.custom-dialog-btn { padding: 10px 25px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; min-width: 80px; }
.custom-dialog-btn.confirm { background: #3498db; color: #fff; }
.custom-dialog-btn.confirm:hover { background: #2980b9; }
.custom-dialog-btn.cancel { background: #bdc3c7; color: #fff; }
.custom-dialog-btn.cancel:hover { background: #95a5a6; }
.toast-message {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 10px 24px;
  border-radius: 25px; font-size: 14px; z-index: 99999;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast-message.show { opacity: 1; }
</style>
</head>
<body>

<div class="login-card">
  <h1>🎰 港澳识别系统</h1>
  <div class="login-subtitle">智能订单识别 · 风险实时计算</div>

  <!-- 登录表单 -->
  <div id="loginFormView">
    <input type="text" id="loginUsername" placeholder="用户名">
    <input type="password" id="loginPassword" placeholder="密码">
    <div style="display:flex;align-items:center;margin-bottom:12px;text-align:left;">
      <input type="checkbox" id="rememberPwd" style="width:18px;height:18px;margin-right:8px;">
      <label for="rememberPwd" style="font-size:14px;color:#555;">记住账号</label>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">登录</button>
    <div class="login-links">
      <span class="login-link" id="showRegisterLink">注册新用户</span>
    </div>
  </div>

  <!-- 注册表单 -->
  <div id="registerFormView" style="display:none;">
    <input type="text" id="regUsername" placeholder="用户名">
    <input type="password" id="regPassword" placeholder="密码">
    <div class="login-error" id="registerError"></div>
    <button class="login-btn" id="registerBtn" style="background:#3498db;">注册</button>
    <div class="login-links">
      <span class="login-link" id="backToLoginFromReg">返回登录</span>
    </div>
  </div>

  <!-- 激活表单 -->
  <div id="activateFormView" style="display:none;">
    <input type="text" id="actUsername" placeholder="用户名" readonly>
    <input type="text" id="actCode" placeholder="激活码">
    <div class="login-error" id="activateError"></div>
    <button class="login-btn" id="activateBtn" style="background:#f39c12;">激活</button>
    <div class="login-links">
      <span class="login-link" id="backToLoginFromAct">返回登录</span>
    </div>
  </div>
</div>

<script>
// ========== 公共函数（与主系统保持一致） ==========
const API_BASE = '';
let authToken = sessionStorage.getItem('authToken') || null;

async function fetchApi(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(API_BASE + url, { ...options, headers });
  if (res.status === 401 || res.status === 403) {
    const data = await res.json().catch(() => ({}));
    if (data.needActivation) throw new Error('NEED_ACTIVATION');
    authToken = null; sessionStorage.removeItem('authToken');
    throw new Error(data.error || '未登录');
  }
  if (!res.ok) {
    const error = await res.json().catch(() => ({ error: '网络错误' }));
    throw new Error(error.error || '网络错误');
  }
  return res.json();
}

function showToast(msg) {
  const toast = document.createElement('div'); toast.className = 'toast-message'; toast.textContent = msg;
  document.body.appendChild(toast); requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
}

function showCustomDialog({ title = '提示', message = '', type = 'alert', defaultValue = '', placeholder = '', confirmText = '确定', cancelText = '取消' }) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div'); overlay.className = 'custom-dialog-overlay';
    overlay.innerHTML = `<div class="custom-dialog-box"><div class="custom-dialog-title">${title}</div><div class="custom-dialog-message">${message.replace(/\n/g, '<br>')}</div>${type==='prompt'?`<input class="custom-dialog-input" type="text" value="${defaultValue}" placeholder="${placeholder}" id="custom-dialog-input">`:''}<div class="custom-dialog-buttons">${type==='confirm'||type==='prompt'?`<button class="custom-dialog-btn cancel" id="custom-dialog-cancel">${cancelText}</button>`:''}<button class="custom-dialog-btn confirm" id="custom-dialog-confirm">${confirmText}</button></div></div>`;
    document.body.appendChild(overlay);
    const confirmBtn = overlay.querySelector('#custom-dialog-confirm'), cancelBtn = overlay.querySelector('#custom-dialog-cancel'), inputEl = overlay.querySelector('#custom-dialog-input');
    const close = (result) => { document.body.removeChild(overlay); resolve(result); };
    confirmBtn.onclick = () => { if (type === 'prompt') close(inputEl.value); else if (type === 'confirm') close(true); else close(undefined); };
    if (cancelBtn) cancelBtn.onclick = () => { if (type === 'confirm') close(false); else if (type === 'prompt') close(null); else close(undefined); };
    if (inputEl) { inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmBtn.click(); }); inputEl.focus(); }
  });
}
window.alert = async (msg) => { await showCustomDialog({ title: '提示', message: msg, type: 'alert' }); };
window.confirm = async (msg) => { return await showCustomDialog({ title: '请确认', message: msg, type: 'confirm' }); };
window.prompt = async (msg, def) => { return await showCustomDialog({ title: '请输入', message: msg, type: 'prompt', defaultValue: def }); };

// ========== 登录/注册/激活 ==========
document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const remember = document.getElementById('rememberPwd').checked;
  if (!username || !password) { document.getElementById('loginError').textContent = '请输入用户名和密码'; return; }
  try {
    const data = await fetchApi('/api/auth/login', { method:'POST', body: JSON.stringify({ username, password }) });
    authToken = data.token; sessionStorage.setItem('authToken', authToken);
    if (remember) localStorage.setItem('savedUsername', username);
    else localStorage.removeItem('savedUsername');
    // 登录成功，跳转到主系统
    window.location.href = '/app';
  } catch(e) {
    if (e.message === 'NEED_ACTIVATION') {
      document.getElementById('loginError').textContent = '账号未激活或已过期，请先激活';
      document.getElementById('actUsername').value = username;
      document.getElementById('loginFormView').style.display = 'none';
      document.getElementById('activateFormView').style.display = '';
      document.getElementById('activateError').textContent = '';
    } else document.getElementById('loginError').textContent = e.message;
  }
};

document.getElementById('showRegisterLink').onclick = () => {
  document.getElementById('loginFormView').style.display = 'none';
  document.getElementById('registerFormView').style.display = '';
  document.getElementById('activateFormView').style.display = 'none';
  document.getElementById('registerError').textContent = '';
};

document.getElementById('registerBtn').onclick = async () => {
  const username = document.getElementById('regUsername').value.trim(), password = document.getElementById('regPassword').value.trim();
  if (!username || !password) { document.getElementById('registerError').textContent = '请输入用户名和密码'; return; }
  try {
    await fetchApi('/api/auth/register', { method:'POST', body: JSON.stringify({ username, password }) });
    document.getElementById('actUsername').value = username;
    document.getElementById('registerFormView').style.display = 'none';
    document.getElementById('activateFormView').style.display = '';
    document.getElementById('activateError').textContent = '注册成功，请输入激活码激活';
  } catch(e) { document.getElementById('registerError').textContent = e.message; }
};

document.getElementById('activateBtn').onclick = async () => {
  const username = document.getElementById('actUsername').value.trim(), cardCode = document.getElementById('actCode').value.trim();
  if (!username || !cardCode) { document.getElementById('activateError').textContent = '请输入激活码'; return; }
  try {
    await fetchApi('/api/auth/activate', { method:'POST', body: JSON.stringify({ username, cardCode }) });
    document.getElementById('activateFormView').style.display = 'none';
    document.getElementById('loginFormView').style.display = '';
    document.getElementById('loginUsername').value = username;
    document.getElementById('loginError').textContent = '激活成功，请登录';
  } catch(e) { document.getElementById('activateError').textContent = e.message; }
};

document.getElementById('backToLoginFromReg').onclick = () => {
  document.getElementById('registerFormView').style.display = 'none';
  document.getElementById('activateFormView').style.display = 'none';
  document.getElementById('loginFormView').style.display = '';
  document.getElementById('loginError').textContent = '';
};

document.getElementById('backToLoginFromAct').onclick = () => {
  document.getElementById('activateFormView').style.display = 'none';
  document.getElementById('registerFormView').style.display = 'none';
  document.getElementById('loginFormView').style.display = '';
  document.getElementById('loginError').textContent = '';
};

// 自动填充记住的用户名
window.onload = () => {
  try {
    const savedUsername = localStorage.getItem('savedUsername');
    if (savedUsername) {
      document.getElementById('loginUsername').value = savedUsername;
      document.getElementById('rememberPwd').checked = true;
    }
  } catch(e) {}
  // 如果已经登录，直接跳转主系统
  if (authToken) {
    window.location.href = '/app';
  }
};
</script>
</body>
</html>
