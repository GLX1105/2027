<script>
// ========== 全局变量 ==========
const API_BASE = '';
let authToken = localStorage.getItem('authToken') || null;
let currentUser = null;

// 缓存后端统计数据
let cachedStats = null;
let cachedDate = null;

// ========== API 通信 ==========
async function fetchApi(url, options = {}) {
  const headers = {
    'Content-Type': 'application/json',
    ...(options.headers || {})
  };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(API_BASE + url, { ...options, headers });

  if (res.status === 401 || res.status === 403) {
    const data = await res.json().catch(() => ({}));
    if (data.needActivation) throw new Error('NEED_ACTIVATION');
    authToken = null;
    localStorage.removeItem('authToken');
    currentUser = null;
    const overlay = document.getElementById('loginOverlay');
    if (!overlay || overlay.style.display === 'none') showLoginScreen();
    throw new Error(data.error || '未登录');
  }
  if (!res.ok) {
    const error = await res.json().catch(() => ({ error: '网络错误' }));
    throw new Error(error.error || '网络错误');
  }
  return res.json();
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast-message';
  toast.textContent = msg;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
}

// ========== 自定义对话框 ==========
function showCustomDialog({ title = '提示', message = '', type = 'alert', defaultValue = '', placeholder = '' }) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div'); overlay.className = 'custom-dialog-overlay';
    overlay.innerHTML = `<div class="custom-dialog-box"><div class="custom-dialog-title">${title}</div><div class="custom-dialog-message">${message}</div>${type==='prompt'?`<input class="custom-dialog-input" type="text" value="${defaultValue}" placeholder="${placeholder}" id="custom-dialog-input">`:''}<div class="custom-dialog-buttons">${type==='confirm'||type==='prompt'?'<button class="custom-dialog-btn cancel" id="custom-dialog-cancel">取消</button>':''}<button class="custom-dialog-btn confirm" id="custom-dialog-confirm">确定</button></div></div>`;
    document.body.appendChild(overlay);
    const confirmBtn = overlay.querySelector('#custom-dialog-confirm'); const cancelBtn = overlay.querySelector('#custom-dialog-cancel'); const inputEl = overlay.querySelector('#custom-dialog-input');
    const close = (result) => { document.body.removeChild(overlay); resolve(result); };
    confirmBtn.onclick = () => { if (type === 'prompt') close(inputEl.value); else if (type === 'confirm') close(true); else close(undefined); };
    if (cancelBtn) cancelBtn.onclick = () => { if (type === 'confirm') close(false); else if (type === 'prompt') close(null); else close(undefined); };
    if (inputEl) { inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmBtn.click(); }); inputEl.focus(); }
  });
}
window.alert = async (msg) => { await showCustomDialog({ title: '提示', message: msg, type: 'alert' }); };
window.confirm = async (msg) => { return await showCustomDialog({ title: '请确认', message: msg, type: 'confirm' }); };
window.prompt = async (msg, def) => { return await showCustomDialog({ title: '请输入', message: msg, type: 'prompt', defaultValue: def }); };

// ========== 登录相关 ==========
function showLoginScreen() {
  const overlay = document.getElementById('loginOverlay');
  if (overlay) overlay.style.display = '';
  try {
    const saved = localStorage.getItem('savedCredentials');
    if (saved) {
      const cred = JSON.parse(saved);
      document.getElementById('loginUsername').value = cred.username || '';
      document.getElementById('loginPassword').value = cred.password || '';
      document.getElementById('rememberPwd').checked = true;
    }
  } catch(e) {}
  document.getElementById('loginFormView').style.display = '';
  document.getElementById('registerFormView').style.display = 'none';
  document.getElementById('activateFormView').style.display = 'none';
  document.getElementById('adminLoginArea').style.display = 'none';
  document.getElementById('loginError').textContent = '';
}

document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const remember = document.getElementById('rememberPwd').checked;
  if (!username || !password) {
    document.getElementById('loginError').textContent = '请输入用户名和密码';
    return;
  }
  try {
    const data = await fetchApi('/api/auth/login', { method:'POST', body: JSON.stringify({ username, password }) });
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = { username: data.username, role: data.role };
    if (remember) {
      localStorage.setItem('savedCredentials', JSON.stringify({ username, password }));
    } else {
      localStorage.removeItem('savedCredentials');
    }
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    initMainSystem();
  } catch(e) {
    if (e.message === 'NEED_ACTIVATION') {
      document.getElementById('loginError').textContent = '账号未激活或已过期，请先激活';
      document.getElementById('actUsername').value = username;
      document.getElementById('loginFormView').style.display = 'none';
      document.getElementById('activateFormView').style.display = '';
      document.getElementById('activateError').textContent = '';
    } else {
      document.getElementById('loginError').textContent = e.message;
    }
  }
};

document.getElementById('showRegisterLink').onclick = () => {
  document.getElementById('loginFormView').style.display = 'none';
  document.getElementById('registerFormView').style.display = '';
  document.getElementById('activateFormView').style.display = 'none';
  document.getElementById('registerError').textContent = '';
};

document.getElementById('registerBtn').onclick = async () => {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  if (!username || !password) {
    document.getElementById('registerError').textContent = '请输入用户名和密码';
    return;
  }
  try {
    await fetchApi('/api/auth/register', { method:'POST', body: JSON.stringify({ username, password }) });
    document.getElementById('actUsername').value = username;
    document.getElementById('registerFormView').style.display = 'none';
    document.getElementById('activateFormView').style.display = '';
    document.getElementById('activateError').textContent = '注册成功，请输入激活码激活';
  } catch(e) {
    document.getElementById('registerError').textContent = e.message;
  }
};

document.getElementById('activateBtn').onclick = async () => {
  const username = document.getElementById('actUsername').value.trim();
  const cardCode = document.getElementById('actCode').value.trim();
  if (!username || !cardCode) {
    document.getElementById('activateError').textContent = '请输入激活码';
    return;
  }
  try {
    await fetchApi('/api/auth/activate', { method:'POST', body: JSON.stringify({ username, cardCode }) });
    document.getElementById('activateError').textContent = '';
    document.getElementById('activateFormView').style.display = 'none';
    document.getElementById('loginFormView').style.display = '';
    document.getElementById('loginUsername').value = username;
    document.getElementById('loginError').textContent = '激活成功，请登录';
  } catch(e) {
    document.getElementById('activateError').textContent = e.message;
  }
};

document.getElementById('showAdminLoginLink').onclick = () => {
  const area = document.getElementById('adminLoginArea');
  area.style.display = area.style.display === 'none' ? '' : 'none';
  if (area.style.display !== 'none') document.getElementById('adminPassword').focus();
};

document.getElementById('adminLoginConfirmBtn').onclick = async () => {
  const password = document.getElementById('adminPassword').value.trim();
  if (!password) {
    document.getElementById('loginError').textContent = '请输入管理员密码';
    return;
  }
  try {
    const data = await fetchApi('/api/auth/admin', { method:'POST', body: JSON.stringify({ password }) });
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = { username: 'admin', role: 'admin' };
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    initMainSystem();
  } catch(e) {
    document.getElementById('loginError').textContent = e.message;
  }
};

document.getElementById('backToLoginFromReg').onclick = showLoginScreen;
document.getElementById('backToLoginFromAct').onclick = showLoginScreen;

function logout() {
  authToken = null;
  localStorage.removeItem('authToken');
  currentUser = null;
  cachedStats = null;
  location.reload();
}

// ========== 用户配置同步 ==========
async function syncSettingsToServer() {
  const keys = ['customDataConfigObj', 'replacePresets', 'categoryAliases', 'customPrefixes', 'customSuffixes', 'customAmountSuffixes', 'customAmountPrefixes', 'selectedStartZodiac'];
  for (const key of keys) {
    const val = localStorage.getItem(key);
    if (val !== null) {
      try {
        await fetchApi('/api/settings', { method:'POST', body: JSON.stringify({ key, value: val }) });
      } catch(e) {}
    }
  }
}

async function loadSettingsFromServer() {
  try {
    const settings = await fetchApi('/api/settings');
    for (const key in settings) {
      localStorage.setItem(key, settings[key]);
    }
  } catch(e) {}
}

  for (let i = 1; i <= 7; i++) ids.duanwei[`dw_${i}`] = `${i}段`;
  for (let i = 0; i <= 9; i++) ids.hewei[`hw_${i}`] = `${i}合尾`;
  for (let i = 0; i <= 4; i++) {
    ids.toushuDanshuang[`tds_${i}dan`] = `${i}头单`;
    ids.toushuDanshuang[`tds_${i}shuang`] = `${i}头双`;
  }
  for (const [group, groupIds] of Object.entries(ids)) {
    for (const [id, label] of Object.entries(groupIds)) {
      const el = document.getElementById(`config_${id}`);
      if (!el) continue;
      const val = el.value.trim();
      if (group === 'zodiac' || group === 'wuxing' || group === 'bose' || group === 'banbo' ||
          group === 'danshuang' || group === 'weishu' || group === 'daxiaodanshuang' ||
          group === 'daxiao' || group === 'heshu' || group === 'toushu' || group === 'menshu' ||
          group === 'duanwei' || group === 'hedahexiao' || group === 'weidaweixiao' ||
          group === 'hewei' || group === 'heshudanshuang' || group === 'toushuDanshuang') {
        configData[group][label] = val.split(/\s+/).filter(n => /^\d+$/.test(n));
      } else if (group === 'shengxiaoAttr') {
        configData[group][label] = val.split(/\s+/);
      }
    }
  }
  const customCats = loadCustomCategories();
  customCats.forEach((cat, idx) => {
    const el = document.getElementById(`config_custom_${idx}`);
    if (el) {
      const val = el.value.trim();
      configData.weishu[cat.label] = val.split(/\s+/).filter(n => /^\d+$/.test(n));
    }
  });
  return configData;
}

function renderAllFromStats(data) {
  if (!data) return;
  const { list, totalBet, totalRebate, numberOrderTotal, zodiacWeightedTotal, zodiacList, reportAmountData } = data;

  // 渲染风险表
  const tbody = document.getElementById('tableBody');
  if (tbody) {
    tbody.innerHTML = '';
    list.forEach(item => {
      const cls = ['01','02','07','08','12','13','18','19','23','24','29','30','34','35','40','45','46'].includes(item.num) ? 'red-text' :

      const risk = Math.round(reportTotalBet - item.bet * reportMultiple - parseFloat(reportRebate));

function applyReportCap() {
  // 截断阈值处理
  const capInput = document.getElementById('reportCapInput');
  const cap = parseFloat(capInput?.value);
  if (!isNaN(cap) && cap > 0 && cachedStats) {
    // 重新渲染上报表时应用截断
    const list = cachedStats.list;
    const reportMultiple = document.getElementById('reportMultipleVal')?.value || 47;
    const reportRebateRate = document.getElementById('reportRebateRate')?.value || 4;
    const reportTotalBet = list.reduce((s, i) => s + Math.min(i.bet, cap), 0);
    const reportRebate = (reportTotalBet * reportRebateRate / 100).toFixed(2);
    const tbody = document.getElementById('reportTableBody');
    if (tbody) {
      tbody.innerHTML = '';
      list.forEach(item => {
        const bet = Math.min(item.bet, cap);
        const risk = Math.round(reportTotalBet - bet * reportMultiple - parseFloat(reportRebate));
        const cls = ['01','02','07','08','12','13','18','19','23','24','29','30','34','35','40','45','46'].includes(item.num) ? 'red-text' :
                    (['03','04','09','10','14','15','20','25','26','31','36','37','41','42','47','48'].includes(item.num) ? 'blue-text' : 'green-text');
        const tr = document.createElement('tr');
        tr.className = cls;
        tr.innerHTML = `<td>${item.num}${item.zodiac}</td><td>${bet}</td><td>${risk}</td><td>${item.num}</td><td>${item.rank}</td>`;
        tbody.appendChild(tr);
      });
      document.getElementById('reportTotalBet').textContent = reportTotalBet;
      document.getElementById('reportTotalRebate').textContent = reportRebate;
      const info = document.getElementById('reportCapInfo');
      const exc = [];
      for (let item of list) {
        if (item.bet > cap) exc.push({ num: item.num, exceed: item.bet - cap });
      }
      if (exc.length > 0) {
        exc.sort((a, b) => a.exceed - b.exceed);
        let txt = ''; let te = 0;
        exc.forEach(x => { txt += `${x.num}各${x.exceed}米<br>`; te += x.exceed; });
        txt += `合计${te}`;
        info.innerHTML = txt;
      } else { info.textContent = '无超出的号码'; }
    }
  } else if (!isNaN(cap) && cap <= 0) {
    document.getElementById('reportCapInput').value = '';
    generateReportTable();
  }
}

function switchRiskReport() {
  const val = document.getElementById('riskReportSwitcher').value;
  if (val === 'total') {
    document.getElementById('riskSection').style.display = '';
    document.getElementById('reportSection').style.display = 'none';
    document.getElementById('viewUserSelect').style.display = 'none';
    generateRiskTable();
  } else if (val === 'user') {
    document.getElementById('riskSection').style.display = '';
    document.getElementById('reportSection').style.display = 'none';
    document.getElementById('viewUserSelect').style.display = 'inline-block';
    generateRiskTable();
  } else if (val === 'report') {
    document.getElementById('riskSection').style.display = 'none';
    document.getElementById('reportSection').style.display = '';
    generateReportTable();
  }
}

async function saveOrder() {
  const tag = document.getElementById('orderUserSelect')?.value;
  if (!tag) { showToast('请选择标签'); return; }
  const input = document.getElementById('orderResult')?.value.trim() || document.querySelector('.source-order-input')?.value.trim();
  if (!input) return;
  const lines = input.split('\n').filter(l => { const m = l.match(/各数\s+(\d+)/); return m && parseInt(m[1]) > 0; });
  if (!lines.length) { showToast('订单无效'); return; }
  const content = lines.join('\n');
  const date = document.getElementById('orderDate')?.value || getTodayCST();
  const total = computeCurrentOrderTotal();
  try {
    await fetchApi('/api/orders', { method:'POST', body: JSON.stringify({ content, tag, date, totalAmount: total }) });
    const si = document.querySelector('.source-order-input');
    if (si) si.value = '';
    const re = document.getElementById('orderResult');
    if (re) re.value = '';
    updateOrderTotalDisplay();
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    refreshAllData();
  } catch (e) { showToast('保存失败：' + e.message); }
}

// ========== 辅助函数 ==========
function getTodayCST() {
  const now = new Date();
  const offset = 8 * 60;
  const localTime = now.getTime() + (now.getTimezoneOffset() + offset) * 60000;
  const cstDate = new Date(localTime);
  return `${cstDate.getFullYear()}-${String(cstDate.getMonth() + 1).padStart(2, '0')}-${String(cstDate.getDate()).padStart(2, '0')}`;
}

function updateOrderTotalDisplay() {
  const re = document.getElementById('orderResult');
  const box = document.getElementById('orderTotalAmountBox');
  const span = document.getElementById('orderTotalAmount');
  if (!re || !box || !span) return;
  const txt = re.value.trim();
  if (!txt) { box.style.display = 'none'; return; }
  const lines = txt.split('\n');
  const cfg = getAllConfigData();
  let total = 0;
  lines.forEach(line => {
    const m = line.match(/各数\s+(\d+)/);
    if (m) {
      const amount = parseInt(m[1]) || 0;
      const parts = line.split(/\s+各数\s+/)[0].split('-');
      let cnt = parts.length;
      if (cnt > 0) total += cnt * amount;
    }
  });
  span.textContent = total;
  box.style.display = 'inline-flex';
}

function computeCurrentOrderTotal() {
  const re = document.getElementById('orderResult');
  if (!re) return 0;
  const txt = re.value.trim();
  if (!txt) return 0;
  const lines = txt.split('\n');
  let total = 0;
  lines.forEach(line => {
    const m = line.match(/各数\s+(\d+)/);
    if (m) {
      const amount = parseInt(m[1]) || 0;
      const parts = line.split(/\s+各数\s+/)[0].split('-');
      if (parts.length > 0) total += parts.length * amount;
    }
  });
  return total;
}

async function calculateStorageUsage() {
  try {
    const orders = await getOrderRecords();
    const reports = await getReportOrderRecords();
    const count = orders.length + reports.length;
    document.getElementById('orderCount').textContent = count;
    document.getElementById('usedSpace').textContent = '0 MB';
    document.getElementById('freeSpace').textContent = '50 MB';
  } catch (e) {}
}

// ========== 快捷添加分类 ==========
function quickAddWithAmount(text, button) {
  const input = document.querySelector('.source-order-input');
  if (!input) return;
  const lines = input.value.trim().split('\n').filter(l => l.trim());
  const idx = lines.findIndex(l => l.includes(text) && (l.includes('各数') || l.includes('各号')));
  if (idx !== -1) { lines.splice(idx, 1); button.classList.remove('active'); }
  else { lines.push(`${text} 各数`); button.classList.add('active'); }
  input.value = lines.join('\n');
  convertOrderText();
}

async function applyPrizeFilter() {
  const tagEl = document.getElementById('recordTagFilter');
  const dateEl = document.getElementById('recordDateFilter');
  const prizeEl = document.getElementById('prizeNumberInput');
  const container = document.getElementById('orderListContainer');
  if (!container) return;
  const tag = tagEl?.value || '';
  const date = dateEl?.value || '';
  const pn = prizeEl?.value.trim() || '';
  try {
    const recs = await getOrderRecords(date, tag);
    if (recs.length === 0) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">暂无订单记录</div>';
      return;
    }
    const cfg = getAllConfigData();
    let filtered = recs;
    if (pn) {
      filtered = recs.filter(r => {
        return r.content.split('\n').some(line => {
          const m = line.match(/^(.+?)\s+各数\s+(\d+)$/);
          if (!m) return false;
          const parts = m[1].split('-');
          const t = pn.padStart(2, '0');
          return parts.some(p => {
            if (/^\d{1,2}$/.test(p)) return p.padStart(2, '0') === t;
            const nums = getNumberListForCategory(p, cfg);
            return nums.includes(t);
          });
        });
      });
    }
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">暂无匹配订单</div>';
      return;
    }
    const itemsHtml = await Promise.all(filtered.map(async it => {
      const ts = formatTimestampToCST(it.timestamp);
      const ta = it.totalAmount || 0;
      const lines = it.content.split('\n');
      const hlLines = await Promise.all(lines.map(async l => {
        const m = l.match(/^(.+?)\s+各数\s+(\d+)$/);
        if (!m) return l;
        const cont = m[1], amt = m[2];
        const hc = await highlightContent(cont, pn, cfg);
        return `${hc} 各数 ${amt}`;
      }));
      return `<div class="order-item"><input type="checkbox" class="order-check" data-id="${it.id}"><div class="order-content">${hlLines.join('<br>')}</div><div class="order-info"><span class="order-total" style="color:#000;">合计：${ta}</span><span class="order-meta">标签：${it.tag} &nbsp; ${ts}</span></div><button class="order-del" onclick="deleteOrderRecord(${it.id})">删除</button></div>`;
    }));
    container.innerHTML = itemsHtml.join('');
  } catch (e) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">加载失败</div>';
  }
}

function formatTimestampToCST(iso) {
  const d = new Date(iso);
  return new Intl.DateTimeFormat('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone:'Asia/Shanghai' }).format(d);
}

async function verifyPassword(type, password) {
  try {
    const res = await fetchApi('/api/verify-password', { method:'POST', body: JSON.stringify({ type, password }) });
    return res.valid;
  } catch (e) { return false; }
}

async function resetTable() {
  const pwd = await prompt("输入清空密码：", "");
  if (!pwd) return;
  if (!(await verifyPassword('clear', pwd))) { await alert("密码错误"); return; }
  try {
    await fetchApi('/api/clear-data', { method:'POST', body: JSON.stringify({ password: pwd }) });
    cachedStats = null;
    refreshAllData();
    showToast('数据已清空');
  } catch (e) { showToast('清空失败：' + e.message); }
}

// ========== 窗口管理 ==========
let highestZ = 2000;
function makeWindowDraggable(winId) {
  const win = document.getElementById(winId); if (!win) return;
  const header = win.querySelector('.modal-header') || win.querySelector('.database-modal-header'); if (!header) return;
  let isDragging = false, startX, startY, startLeft, startTop;
  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('.window-controls')) return;
    isDragging = true;
    const rect = win.getBoundingClientRect();
    startX = e.clientX; startY = e.clientY; startLeft = rect.left; startTop = rect.top;
    win.style.cursor = 'grabbing'; e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    win.style.left = (startLeft + e.clientX - startX) + 'px';
    win.style.top = (startTop + e.clientY - startY) + 'px';
    win.style.transform = 'none';
  });
  document.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; win.style.cursor = ''; } });
  win.addEventListener('mousedown', () => { highestZ += 1; win.style.zIndex = highestZ; });
}

function maximizeWindow(winId) {
  const win = document.getElementById(winId); if (!win) return;
  const isMaximized = win.getAttribute('data-maximized') === 'true';
  if (isMaximized) {
    const origWidth = win.getAttribute('data-orig-width');
    const origHeight = win.getAttribute('data-orig-height');
    const origLeft = win.getAttribute('data-orig-left');
    const origTop = win.getAttribute('data-orig-top');
    const origTransform = win.getAttribute('data-orig-transform');
    if (origWidth) win.style.width = origWidth;
    if (origHeight) win.style.height = origHeight;
    if (origLeft) win.style.left = origLeft;
    if (origTop) win.style.top = origTop;
    if (origTransform !== null) win.style.transform = origTransform;
    win.style.right = ''; win.style.bottom = '';
    win.setAttribute('data-maximized', 'false');
    win.style.resize = 'both'; win.style.overflow = 'auto';
  } else {
    const rect = win.getBoundingClientRect();
    win.setAttribute('data-orig-width', win.style.width || (rect.width + 'px'));
    win.setAttribute('data-orig-height', win.style.height || (rect.height + 'px'));
    win.setAttribute('data-orig-left', win.style.left || (rect.left + 'px'));
    win.setAttribute('data-orig-top', win.style.top || (rect.top + 'px'));
    win.setAttribute('data-orig-transform', win.style.transform || '');
    win.style.left = '0'; win.style.top = '0'; win.style.right = '0'; win.style.bottom = '0';
    win.style.width = 'auto'; win.style.height = 'auto'; win.style.transform = 'none';
    win.setAttribute('data-maximized', 'true');
    win.style.resize = 'none'; win.style.overflow = 'auto';
  }
}

function pinWindow(winId) {
  const win = document.getElementById(winId); if (!win) return;
  highestZ += 1; win.style.zIndex = highestZ;
  showToast('窗口已置顶');
}

async function exportData() {

    const orders = await getOrderRecords();

    const configs = {};
    ['customDataConfigObj','replacePresets','categoryAliases','customPrefixes','customSuffixes','customAmountSuffixes','customAmountPrefixes','selectedStartZodiac'].forEach(k => {
      const v = localStorage.getItem(k); if (v) configs[k] = v;
    });
    const data = { orders, reports, configs, exportTime: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `港澳识别数据_${getTodayCST()}.json`; a.click();
    URL.revokeObjectURL(url);
  } catch (e) { showToast('导出失败'); }
}

async function importData() {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json'; inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = async (e) => {
    const file = e.target.files[0]; if (!file) { document.body.removeChild(inp); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.orders || !data.reports) { showToast('无效格式'); document.body.removeChild(inp); return; }
        const existingOrders = await getOrderRecords();
        const existingReports = await getReportOrderRecords();
        let newOrders = 0, newReports = 0;
        for (const r of data.orders) {
          if (!existingOrders.find(o => o.timestamp === r.timestamp && o.content === r.content && o.tag === r.tag)) {
            await fetchApi('/api/orders', { method:'POST', body: JSON.stringify({ content: r.content, tag: r.tag, date: r.date, totalAmount: r.totalAmount }) });
            newOrders++;
          }
        }
        for (const r of data.reports) {
          if (!existingReports.find(o => o.timestamp === r.timestamp && o.content === r.content && o.tag === r.tag)) {
            await fetchApi('/api/report-orders', { method:'POST', body: JSON.stringify({ content: r.content, tag: r.tag, date: r.date, totalAmount: r.totalAmount }) });
            newReports++;
          }
        }
        if (data.configs) {
          Object.keys(data.configs).forEach(k => localStorage.setItem(k, data.configs[k]));
          await syncSettingsToServer();
        }
        showToast(`导入完成：新增${newOrders}条下单，${newReports}条上报`);
        refreshAllData();
        document.body.removeChild(inp);
      } catch (err) { showToast('导入失败'); document.body.removeChild(inp); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

async function generateCard() {
  const days = parseInt(document.getElementById('expireDays')?.value) || 30;
  try {
    const res = await fetchApi('/api/cards/generate', { method:'POST', body: JSON.stringify({ expireDays: days }) });
    showToast('激活码已生成：' + res.code);
    loadCardList();
  } catch (e) { showToast(e.message); }
}

async function disableCard(id) {
  if (!(await confirm('确定禁用？'))) return;
  try {
    await fetchApi(`/api/cards/${id}/disable`, { method:'POST' });
    loadCardList();
  } catch (e) { showToast(e.message); }
}

function copyCardCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast('已复制')).catch(() => showToast('复制失败'));
}

// ========== 语义转换 ==========
async function semanticReplace() {
  const ta = document.querySelector('.source-order-input');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  if (s === e) { showToast('请先选择文本'); return; }
  const sel = ta.value.substring(s, e);
  const cfg = getAllConfigData();
  const vc = new Set();
  // 收集所有有效分类关键字（简化版，可按需扩展）
  for (const key in cfg) {
    if (typeof cfg[key] === 'object') Object.keys(cfg[key]).forEach(k => vc.add(k));
  }
  const tokens = sel.split(/[\s,，.。、+\-*＊\/\\|]+/).filter(t => t.trim());
  const matched = tokens.filter(t => vc.has(t));
  if (!matched.length) { showToast('未识别有效分类'); return; }
  let sets = matched.map(cat => {
    let nums = [];
    if (cfg.shengxiaoAttr[cat]) {
      cfg.shengxiaoAttr[cat].forEach(z => { if (cfg.zodiac[z]) nums.push(...cfg.zodiac[z].map(n => n.padStart(2,'0'))); });
    }
    const sources = [cfg.wuxing, cfg.bose, cfg.banbo, cfg.danshuang, cfg.weishu, cfg.daxiaodanshuang, cfg.daxiao, cfg.heshu, cfg.toushu, cfg.menshu, cfg.duanwei, cfg.hedahexiao, cfg.weidaweixiao, cfg.hewei, cfg.heshudanshuang, cfg.toushuDanshuang];
    for (const src of sources) {
      if (src && src[cat]) nums.push(...src[cat].map(n => n.padStart(2,'0')));
    }
    if (cfg.zodiac[cat]) nums.push(...cfg.zodiac[cat].map(n => n.padStart(2,'0')));
    return new Set(nums);
  });
  let inter = sets[0];
  for (let i = 1; i < sets.length; i++) inter = new Set([...inter].filter(x => sets[i].has(x)));
  const res = [...inter].sort((a,b) => parseInt(a)-parseInt(b));
  if (!res.length) { showToast('无共同号码'); return; }
  const str = res.join('-');
  const cf = await confirm(`转换结果：${str}\n是否替换选中文本？`);
  if (cf) { ta.value = ta.value.substring(0,s) + str + ta.value.substring(e); convertOrderText(); }
}

// ========== 分隔符替换/清除 ==========
function removeSeparators() {
  const ta = document.querySelector('.source-order-input');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  if (s === e) { showToast('请先选择文本'); return; }
  const sel = ta.value.substring(s, e);
  const cleaned = sel.replace(/[\s,，.。、+\-*＊\/\\|]+/g, '');
  ta.value = ta.value.substring(0, s) + cleaned + ta.value.substring(e);
  convertOrderText();
}

function replaceSeparators() {
  const ta = document.querySelector('.source-order-input');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  if (s === e) { showToast('请先选择文本'); return; }
  const sel = ta.value.substring(s, e);
  const replaced = sel.replace(/[\s,，.。、+\-*＊\/\\|]+/g, '-');
  ta.value = ta.value.substring(0, s) + replaced + ta.value.substring(e);
  convertOrderText();
}
